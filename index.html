<!DOCTYPE html>
<!-- v3 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0e0c">
<title>My Recipes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'DM Sans', sans-serif; background: #0f0e0c; color: #f0ebe3; }
.screen { position: fixed; inset: 0; display: flex; flex-direction: column; overflow: hidden; transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s; }
.screen.hidden { transform: translateX(100%); opacity: 0; pointer-events: none; }
#homeScreen { background: #0f0e0c; }
.home-header { padding: 56px 24px 20px; border-bottom: 1px solid rgba(240,235,227,0.07); flex-shrink: 0; }
.home-header-top { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 20px; }
.home-label { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: #c9a96e; margin-bottom: 6px; font-weight: 500; }
.home-title { font-family: 'Playfair Display', serif; font-size: 34px; font-weight: 400; line-height: 1; }
.home-title em { font-style: italic; color: #c9a96e; }
.add-btn { width: 44px; height: 44px; background: #c9a96e; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #0f0e0c; flex-shrink: 0; }
.search-bar { position: relative; }
.search-input { width: 100%; background: rgba(240,235,227,0.06); border: 1px solid rgba(240,235,227,0.1); border-radius: 12px; padding: 12px 16px 12px 40px; color: #f0ebe3; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; }
.search-input::placeholder { color: rgba(240,235,227,0.25); }
.search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 16px; opacity: 0.3; pointer-events: none; }
.categories { display: flex; gap: 8px; padding: 16px 24px; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
.categories::-webkit-scrollbar { display: none; }
.cat-btn { flex-shrink: 0; padding: 7px 14px; border-radius: 20px; border: 1px solid rgba(240,235,227,0.12); background: transparent; color: rgba(240,235,227,0.5); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.cat-btn.active { background: #c9a96e; border-color: #c9a96e; color: #0f0e0c; font-weight: 500; }
.cat-add-btn { flex-shrink: 0; padding: 6px 12px; border-radius: 20px; border: 1px dashed rgba(240,235,227,0.2); background: transparent; color: rgba(240,235,227,0.3); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; white-space: nowrap; }
.recipe-list { flex: 1; overflow-y: auto; padding: 8px 24px 100px; }
.recipe-list::-webkit-scrollbar { display: none; }
.empty-state { text-align: center; padding: 80px 40px; }
.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
.empty-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 400; margin-bottom: 8px; color: rgba(240,235,227,0.5); }
.empty-sub { font-size: 13px; color: rgba(240,235,227,0.25); line-height: 1.6; }
.recipe-card { background: rgba(240,235,227,0.04); border-radius: 14px; padding: 16px; margin-bottom: 10px; cursor: pointer; border: 1px solid rgba(240,235,227,0.06); }
.recipe-card:active { background: rgba(240,235,227,0.08); }
.recipe-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.recipe-card-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; line-height: 1.2; flex: 1; }
.recipe-cat-tag { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #c9a96e; background: rgba(201,169,110,0.1); border-radius: 6px; padding: 3px 8px; white-space: nowrap; flex-shrink: 0; margin-top: 3px; }
.recipe-card-meta { font-size: 12px; color: rgba(240,235,227,0.3); margin-top: 6px; }
#scanScreen { background: #0f0e0c; }
.scan-header { padding: 56px 24px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; border-bottom: 1px solid rgba(240,235,227,0.07); }
.back-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(240,235,227,0.06); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #f0ebe3; }
.scan-header-text .scan-label { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: #c9a96e; font-weight: 500; }
.scan-header-text h2 { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 400; }
.scan-body { flex: 1; overflow-y: auto; padding: 24px; }
.scan-body::-webkit-scrollbar { display: none; }
.upload-zone { border: 1.5px dashed rgba(201,169,110,0.35); border-radius: 16px; padding: 40px 20px; text-align: center; cursor: pointer; background: rgba(201,169,110,0.03); display: block; margin-bottom: 20px; }
.upload-icon { width: 56px; height: 56px; background: rgba(201,169,110,0.12); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; font-size: 24px; }
.upload-zone h3 { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 400; margin-bottom: 6px; }
.upload-zone p { font-size: 12px; color: rgba(240,235,227,0.4); }
.preview-img { width: 100%; max-height: 260px; object-fit: cover; border-radius: 14px; display: block; margin-bottom: 16px; }
.preview-meta { font-size: 12px; color: rgba(240,235,227,0.35); text-align: center; margin-bottom: 16px; }
.change-link { display: block; text-align: center; font-size: 12px; color: rgba(201,169,110,0.6); cursor: pointer; margin-bottom: 20px; text-decoration: underline; }
.primary-btn { width: 100%; background: #c9a96e; color: #0f0e0c; border: none; border-radius: 13px; padding: 17px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
.primary-btn:disabled { opacity: 0.45; cursor: not-allowed; }
.spinner { width: 17px; height: 17px; border: 2px solid rgba(15,14,12,0.25); border-top-color: #0f0e0c; border-radius: 50%; animation: spin 0.9s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
.status-msg { text-align: center; font-size: 13px; color: rgba(240,235,227,0.4); margin-top: 14px; }
.error-msg { background: rgba(220,80,60,0.1); border: 1px solid rgba(220,80,60,0.3); border-radius: 12px; padding: 14px; font-size: 13px; color: rgba(240,235,227,0.8); margin-top: 16px; line-height: 1.6; word-break: break-word; }
.extracted-card { margin-top: 24px; background: rgba(240,235,227,0.04); border-radius: 16px; padding: 20px; border: 1px solid rgba(240,235,227,0.08); }
.ext-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #c9a96e; margin-bottom: 6px; }
.ext-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.ext-section-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(240,235,227,0.35); margin-bottom: 8px; margin-top: 14px; }
.ext-item { font-size: 13px; color: rgba(240,235,227,0.7); line-height: 1.6; padding: 4px 0; border-bottom: 1px solid rgba(240,235,227,0.04); }
.save-btn { width: 100%; background: #c9a96e; color: #0f0e0c; border: none; border-radius: 13px; padding: 16px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; margin-top: 20px; }
#detailScreen { background: #0f0e0c; }
.detail-header { padding: 56px 24px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; border-bottom: 1px solid rgba(240,235,227,0.07); }
.detail-header-text { flex: 1; min-width: 0; }
.detail-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #c9a96e; font-weight: 500; }
.detail-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.edit-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(201,169,110,0.12); border: 1px solid rgba(201,169,110,0.25); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
.delete-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(220,80,60,0.1); border: 1px solid rgba(220,80,60,0.2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.detail-body { flex: 1; overflow-y: auto; padding: 24px 24px 80px; }
.detail-body::-webkit-scrollbar { display: none; }
.detail-full-title { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; line-height: 1.2; margin-bottom: 6px; }
.detail-cat-tag { display: inline-block; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #c9a96e; background: rgba(201,169,110,0.1); border-radius: 6px; padding: 4px 10px; margin-bottom: 24px; }
.detail-section { margin-bottom: 28px; }
.detail-section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.detail-section-label { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: #c9a96e; font-weight: 500; }
.detail-section-line { flex: 1; height: 1px; background: rgba(201,169,110,0.18); }
.ingredient-row { display: flex; align-items: flex-start; gap: 12px; padding: 11px 13px; background: rgba(240,235,227,0.04); border-radius: 9px; border-left: 2px solid rgba(201,169,110,0.35); margin-bottom: 8px; }
.ingredient-dot { width: 5px; height: 5px; background: #c9a96e; border-radius: 50%; margin-top: 7px; flex-shrink: 0; }
.ingredient-text { font-size: 14px; line-height: 1.5; color: rgba(240,235,227,0.82); font-weight: 300; }
.method-row { display: flex; gap: 13px; margin-bottom: 14px; }
.step-num { font-family: 'Playfair Display', serif; font-size: 20px; color: rgba(201,169,110,0.28); font-weight: 700; line-height: 1; min-width: 26px; padding-top: 2px; }
.step-text { font-size: 14px; line-height: 1.7; color: rgba(240,235,227,0.78); font-weight: 300; padding-bottom: 13px; border-bottom: 1px solid rgba(240,235,227,0.05); flex: 1; }
.method-row:last-child .step-text { border-bottom: none; }
.notes-ta { width: 100%; background: rgba(240,235,227,0.05); border: 1px solid rgba(240,235,227,0.1); border-radius: 12px; padding: 14px; color: #f0ebe3; font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.6; resize: none; min-height: 100px; outline: none; display: block; }
.notes-ta::placeholder { color: rgba(240,235,227,0.2); }
.notes-save-btn { margin-top: 10px; background: rgba(201,169,110,0.15); border: 1px solid rgba(201,169,110,0.3); color: #c9a96e; border-radius: 8px; padding: 8px 16px; font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; }
.cat-chips-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
.ext-cat-chip, .det-cat-chip { padding: 7px 14px; border-radius: 20px; border: 1px solid rgba(240,235,227,0.15); background: transparent; color: rgba(240,235,227,0.45); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; }
.ext-cat-chip.selected, .det-cat-chip.selected { background: #c9a96e; border-color: #c9a96e; color: #0f0e0c; font-weight: 500; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 50; display: none; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-box { background: #1a1917; border-radius: 20px 20px 0 0; padding: 28px 24px 48px; width: 100%; max-width: 430px; }
.modal-box h3 { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 400; margin-bottom: 20px; }
.modal-input { width: 100%; background: rgba(240,235,227,0.06); border: 1px solid rgba(240,235,227,0.12); border-radius: 10px; padding: 12px 14px; color: #f0ebe3; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; margin-bottom: 12px; }
.modal-add-btn { width: 100%; background: #c9a96e; color: #0f0e0c; border: none; border-radius: 12px; padding: 15px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; margin-bottom: 10px; }
.modal-done-btn { width: 100%; background: none; border: none; color: rgba(240,235,227,0.4); font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; padding: 10px; }
.modal-cat-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(240,235,227,0.06); font-size: 14px; }
.modal-cat-del { background: none; border: none; color: rgba(220,80,60,0.4); font-size: 20px; cursor: pointer; }
#editScreen { background: #0f0e0c; }
.edit-body { flex: 1; overflow-y: auto; padding: 24px 24px 100px; }
.edit-body::-webkit-scrollbar { display: none; }
.edit-field-label { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: #c9a96e; font-weight: 500; margin-bottom: 8px; margin-top: 20px; }
.edit-title-input { width: 100%; background: rgba(240,235,227,0.05); border: 1px solid rgba(240,235,227,0.1); border-radius: 10px; padding: 12px 14px; color: #f0ebe3; font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; outline: none; }
.edit-title-input:focus { border-color: rgba(201,169,110,0.4); }
.edit-list-item { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 6px; }
.edit-list-ta { flex: 1; background: rgba(240,235,227,0.05); border: 1px solid rgba(240,235,227,0.1); border-radius: 8px; padding: 9px 11px; color: #f0ebe3; font-family: 'DM Sans', sans-serif; font-size: 13px; line-height: 1.5; resize: none; outline: none; overflow: hidden; min-height: 36px; }
.edit-list-ta:focus { border-color: rgba(201,169,110,0.3); }
.rm-btn { width: 28px; height: 28px; border-radius: 50%; background: rgba(220,80,60,0.1); border: none; color: rgba(220,80,60,0.5); font-size: 18px; cursor: pointer; flex-shrink: 0; margin-top: 4px; }
.add-item-btn { font-size: 12px; color: rgba(201,169,110,0.6); background: none; border: 1px dashed rgba(201,169,110,0.2); border-radius: 8px; padding: 7px 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 4px; display: block; }
.edit-notes-ta { width: 100%; background: rgba(240,235,227,0.05); border: 1px solid rgba(240,235,227,0.1); border-radius: 10px; padding: 12px 14px; color: #f0ebe3; font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.6; resize: none; min-height: 100px; outline: none; }
.edit-notes-ta:focus { border-color: rgba(201,169,110,0.3); }
.edit-notes-ta::placeholder { color: rgba(240,235,227,0.2); }
.save-all-btn { width: 100%; background: #c9a96e; color: #0f0e0c; border: none; border-radius: 13px; padding: 17px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; margin-top: 24px; }
</style>
</head>
<body>

<div class="screen" id="homeScreen">
  <div class="home-header">
    <div class="home-header-top">
      <div>
        <div class="home-label">Your Collection</div>
        <h1 class="home-title">My <em>Recipes</em></h1>
      </div>
      <button class="add-btn" id="addBtn">+</button>
    </div>
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" type="search" placeholder="Search recipes…">
    </div>
  </div>
  <div class="categories" id="categoryBar"></div>
  <div class="recipe-list" id="recipeList"></div>
</div>

<div class="screen hidden" id="scanScreen">
  <div class="scan-header">
    <button class="back-btn" id="backBtn">←</button>
    <div class="scan-header-text">
      <div class="scan-label">New Recipe</div>
      <h2>Scan a photo</h2>
    </div>
  </div>
  <div class="scan-body">
    <label class="upload-zone" id="uploadZone">
      <input type="file" accept="image/*" id="fileInput" style="display:none">
      <div class="upload-icon">📷</div>
      <h3>Upload a recipe photo</h3>
      <p>Tap to choose from your library</p>
    </label>
    <div id="previewSection" style="display:none">
      <img class="preview-img" id="previewImg" src="" alt="">
      <div class="preview-meta" id="previewMeta"></div>
      <label class="change-link">Change photo<input type="file" accept="image/*" id="changeInput" style="display:none"></label>
      <button class="primary-btn" id="scanBtn">✦ Extract Recipe</button>
    </div>
    <div class="status-msg" id="scanStatus" style="display:none"></div>
    <div class="error-msg" id="scanError" style="display:none"></div>
    <div id="extractedSection" style="display:none"></div>
  </div>
</div>

<div class="screen hidden" id="detailScreen">
  <div class="detail-header">
    <button class="back-btn" id="detailBackBtn">←</button>
    <div class="detail-header-text">
      <div class="detail-label" id="detailLabel"></div>
      <div class="detail-title" id="detailHeaderTitle"></div>
    </div>
    <button class="edit-btn" id="editBtn">✏️</button>
    <button class="delete-btn" id="deleteBtn">🗑</button>
  </div>
  <div class="detail-body" id="detailBody"></div>
  <div id="notesSection" style="display:none;padding:0 24px 80px;flex-shrink:0">
    <div class="detail-section-header" style="margin-bottom:10px">
      <div class="detail-section-label">Notes</div>
      <div class="detail-section-line"></div>
    </div>
    <textarea class="notes-ta" id="notesField" placeholder="Add notes, tips, variations…"></textarea>
    <button class="notes-save-btn" id="saveNotesBtn">Save notes</button>
  </div>
</div>

<div class="screen hidden" id="editScreen">
  <div class="scan-header">
    <button class="back-btn" id="editBackBtn">←</button>
    <div class="scan-header-text">
      <div class="scan-label">Editing</div>
      <h2>Edit Recipe</h2>
    </div>
  </div>
  <div class="edit-body" id="editBody"></div>
</div>

<div class="modal-overlay" id="catModal">
  <div class="modal-box">
    <h3>My Categories</h3>
    <div id="catModalList"></div>
    <input class="modal-input" id="newCatInput" placeholder="New category name…">
    <button class="modal-add-btn" id="addCatBtn">Add Category</button>
    <button class="modal-done-btn" id="catDoneBtn">Done</button>
  </div>
</div>

<script>
var recipes = [];
var categories = [];
var activeCategory = 'All';
var currentRecipeId = null;
var currentB64 = null;
var pendingRecipe = null;

try { recipes = JSON.parse(localStorage.getItem('recipes') || '[]'); } catch(e) { recipes = []; }
try { categories = JSON.parse(localStorage.getItem('categories') || '[]'); } catch(e) { categories = []; }

function persist() {
  localStorage.setItem('recipes', JSON.stringify(recipes));
  localStorage.setItem('categories', JSON.stringify(categories));
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) {
    s.classList.toggle('hidden', s.id !== id);
  });
  if (id === 'homeScreen') { var ns = document.getElementById('notesSection'); if (ns) ns.style.display = 'none'; try { renderList(); } catch(e) { console.error('renderList error:', e); } }
  if (id === 'scanScreen') resetScan();
}

document.getElementById('addBtn').addEventListener('click', function() { showScreen('scanScreen'); });
document.getElementById('backBtn').addEventListener('click', function() { showScreen('homeScreen'); });
document.getElementById('detailBackBtn').addEventListener('click', function() { showScreen('homeScreen'); });
document.getElementById('editBackBtn').addEventListener('click', function() { openRecipe(currentRecipeId); });
document.getElementById('searchInput').addEventListener('input', renderList);
document.getElementById('deleteBtn').addEventListener('click', deleteCurrentRecipe);
document.getElementById('fileInput').addEventListener('change', function() { if (this.files && this.files[0]) handleFile(this.files[0]); });
document.getElementById('changeInput').addEventListener('change', function() { if (this.files && this.files[0]) handleFile(this.files[0]); });
document.getElementById('scanBtn').addEventListener('click', scanRecipe);
document.getElementById('addCatBtn').addEventListener('click', addCategory);
document.getElementById('catDoneBtn').addEventListener('click', function() {
  document.getElementById('catModal').classList.remove('open');
  try { renderList(); } catch(e) { console.error('renderList error:', e); }
});
document.getElementById('saveNotesBtn').addEventListener('click', function() {
  var notes = document.getElementById('notesField').value;
  for (var i = 0; i < recipes.length; i++) {
    if (recipes[i].id === currentRecipeId) { recipes[i].notes = notes; break; }
  }
  persist();
  var btn = document.getElementById('saveNotesBtn');
  btn.textContent = '✓ Saved!';
  setTimeout(function() { btn.textContent = 'Save notes'; }, 1500);
});
document.getElementById('editBtn').addEventListener('click', function() { openEditScreen(); });

function openEditScreen() {
  var r = null;
  for (var i = 0; i < recipes.length; i++) { if (recipes[i].id === currentRecipeId) { r = recipes[i]; break; } }
  if (!r) return;

  var rCats = Array.isArray(r.categories) ? r.categories : (r.category ? [r.category] : []);
  var catChips = categories.map(function(c) {
    return '<button class="det-cat-chip' + (rCats.indexOf(c) !== -1 ? ' selected' : '') + '" data-cat="' + c + '">' + c + '</button>';
  }).join('');
  var catSection = categories.length ? '<div class="edit-field-label">Categories</div><div class="cat-chips-wrap" style="margin-bottom:8px">' + catChips + '</div>' : '';

  var ingItems = r.ingredients.map(function(ing, idx) {
    return '<div class="edit-list-item"><textarea class="edit-list-ta" rows="1">' + ing.replace(/</g, '&lt;') + '</textarea><button class="rm-btn" data-type="ing" data-i="' + idx + '">×</button></div>';
  }).join('');

  var methItems = r.method.map(function(s, idx) {
    return '<div class="edit-list-item"><textarea class="edit-list-ta" rows="2">' + s.replace(/</g, '&lt;') + '</textarea><button class="rm-btn" data-type="meth" data-i="' + idx + '">×</button></div>';
  }).join('');

  var safeTitle = r.title.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
  var safeNotes = (r.notes || '').replace(/</g, '&lt;').replace(/&/g, '&amp;');

  var body = document.getElementById('editBody');
  body.innerHTML =
    '<div class="edit-field-label" style="margin-top:0">Title</div>' +
    '<input class="edit-title-input" id="editTitleInput" value="' + safeTitle + '">' +
    catSection +
    '<div class="edit-field-label">Photo</div>' +
    '<div style="margin-bottom:8px" id="photoSection"></div>' +
    '<label style="display:inline-block;background:rgba(201,169,110,0.12);border:1px solid rgba(201,169,110,0.25);color:#c9a96e;border-radius:8px;padding:8px 16px;font-family:DM Sans,sans-serif;font-size:12px;cursor:pointer">📷 Add / Change photo<input type="file" accept="image/*" id="photoInput" style="display:none"></label>' +
    '<div class="edit-field-label">Ingredients</div>' +
    '<div id="ingList">' + ingItems + '</div>' +
    '<button class="add-item-btn" id="addIngBtn">+ Add ingredient</button>' +
    '<div class="edit-field-label">Method</div>' +
    '<div id="methList">' + methItems + '</div>' +
    '<button class="add-item-btn" id="addMethBtn">+ Add step</button>' +
    '<div class="edit-field-label">Notes</div>' +
    '<textarea class="edit-notes-ta" id="editNotesField" placeholder="Add notes, tips, variations…">' + safeNotes + '</textarea>' +
    '<button class="save-all-btn" id="saveAllBtn">✓ Save Recipe</button>';

  body.querySelectorAll('.edit-list-ta').forEach(function(ta) {
    ta.style.height = 'auto';
    ta.style.height = (ta.scrollHeight + 2) + 'px';
    ta.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = (this.scrollHeight + 2) + 'px'; });
  });

  // Photo section setup
  var photoSection = document.getElementById('photoSection');
  if (photoSection) {
    var rPhoto = null;
    for (var pi = 0; pi < recipes.length; pi++) { if (recipes[pi].id === currentRecipeId) { rPhoto = recipes[pi]; break; } }
    if (rPhoto && rPhoto.photo) {
      photoSection.innerHTML = '<img src="' + rPhoto.photo + '" style="width:100%;max-height:200px;object-fit:cover;border-radius:12px;display:block;margin-bottom:8px"><button id="removePhotoBtn" style="background:rgba(220,80,60,0.1);border:1px solid rgba(220,80,60,0.2);color:rgba(220,80,60,0.6);border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:DM Sans,sans-serif;margin-bottom:8px">Remove photo</button>';
      document.getElementById('removePhotoBtn').addEventListener('click', function() {
        for (var i = 0; i < recipes.length; i++) { if (recipes[i].id === currentRecipeId) { recipes[i].photo = ''; break; } }
        persist(); openEditScreen();
      });
    }
  }
  var photoInput = document.getElementById('photoInput');
  if (photoInput) {
    photoInput.addEventListener('change', function() {
      var file = this.files && this.files[0]; if (!file) return;
      var fr = new FileReader();
      fr.onload = function() {
        var img = new Image();
        img.onload = function() {
          var scale = Math.min(1, 800 / Math.max(img.width, img.height));
          var cv = document.createElement('canvas');
          cv.width = Math.round(img.width * scale); cv.height = Math.round(img.height * scale);
          cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
          for (var i = 0; i < recipes.length; i++) { if (recipes[i].id === currentRecipeId) { recipes[i].photo = cv.toDataURL('image/jpeg', 0.75); break; } }
          persist(); openEditScreen();
        };
        img.src = fr.result;
      };
      fr.readAsDataURL(file);
    });
  }
  body.querySelectorAll('.det-cat-chip').forEach(function(chip) {
    chip.addEventListener('click', function() { this.classList.toggle('selected'); });
  });

  body.querySelectorAll('.rm-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var r2 = null;
      for (var i = 0; i < recipes.length; i++) { if (recipes[i].id === currentRecipeId) { r2 = recipes[i]; break; } }
      if (!r2) return;
      var idx = parseInt(this.dataset.i);
      if (this.dataset.type === 'ing') r2.ingredients.splice(idx, 1);
      else r2.method.splice(idx, 1);
      openEditScreen();
    });
  });

  document.getElementById('addIngBtn').addEventListener('click', function() {
    var r2 = null;
    for (var i = 0; i < recipes.length; i++) { if (recipes[i].id === currentRecipeId) { r2 = recipes[i]; break; } }
    if (!r2) return;
    r2.ingredients.push('');
    openEditScreen();
    var tas = document.getElementById('ingList').querySelectorAll('textarea');
    if (tas.length) tas[tas.length - 1].focus();
  });

  document.getElementById('addMethBtn').addEventListener('click', function() {
    var r2 = null;
    for (var i = 0; i < recipes.length; i++) { if (recipes[i].id === currentRecipeId) { r2 = recipes[i]; break; } }
    if (!r2) return;
    r2.method.push('');
    openEditScreen();
    var tas = document.getElementById('methList').querySelectorAll('textarea');
    if (tas.length) tas[tas.length - 1].focus();
  });

  document.getElementById('saveAllBtn').addEventListener('click', function() {
    var r2 = null;
    for (var i = 0; i < recipes.length; i++) { if (recipes[i].id === currentRecipeId) { r2 = recipes[i]; break; } }
    if (!r2) return;
    r2.title = document.getElementById('editTitleInput').value.trim() || r2.title;
if (body.dataset.pendingPhoto) { r2.photo = body.dataset.pendingPhoto; delete body.dataset.pendingPhoto; }
    r2.notes = document.getElementById('editNotesField').value;
    var selected = [];
    body.querySelectorAll('.det-cat-chip.selected').forEach(function(chip) { selected.push(chip.dataset.cat); });
    r2.categories = selected;
    r2.category = selected[0] || '';
    r2.ingredients = [];
    document.getElementById('ingList').querySelectorAll('textarea').forEach(function(ta) { if (ta.value.trim()) r2.ingredients.push(ta.value.trim()); });
    r2.method = [];
    document.getElementById('methList').querySelectorAll('textarea').forEach(function(ta) { if (ta.value.trim()) r2.method.push(ta.value.trim()); });
    persist();
    openRecipe(currentRecipeId);
  });

  showScreen('editScreen');
}

function buildCategories() {
  var bar = document.getElementById('categoryBar');
  var html = '<button class="cat-btn ' + (activeCategory === 'All' ? 'active' : '') + '" data-cat="All">All</button>';
  for (var i = 0; i < categories.length; i++) {
    html += '<button class="cat-btn ' + (activeCategory === categories[i] ? 'active' : '') + '" data-cat="' + categories[i] + '">' + categories[i] + '</button>';
  }
  html += '<button class="cat-add-btn" id="manageCatBtn">+ Category</button>';
  bar.innerHTML = html;
  document.querySelectorAll('.cat-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { activeCategory = this.dataset.cat; try { renderList(); } catch(e) { console.error('renderList error:', e); } });
  });
  document.getElementById('manageCatBtn').addEventListener('click', function() {
    renderCatModal();
    document.getElementById('catModal').classList.add('open');
  });
}

function renderCatModal() {
  var list = document.getElementById('catModalList');
  if (!categories.length) {
    list.innerHTML = '<div style="font-size:13px;color:rgba(240,235,227,0.3);padding:8px 0 16px">No categories yet — add one below</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < categories.length; i++) {
    html += '<div class="modal-cat-row"><span>' + categories[i] + '</span><button class="modal-cat-del" data-i="' + i + '">×</button></div>';
  }
  list.innerHTML = html;
  list.querySelectorAll('.modal-cat-del').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var idx = parseInt(this.dataset.i);
      if (activeCategory === categories[idx]) activeCategory = 'All';
      categories.splice(idx, 1);
      persist();
      renderCatModal();
    });
  });
}

function addCategory() {
  var val = document.getElementById('newCatInput').value.trim();
  if (!val || categories.indexOf(val) !== -1) return;
  categories.push(val);
  persist();
  document.getElementById('newCatInput').value = '';
  renderCatModal();
}

function renderList() {
  buildCategories();
  var q = document.getElementById('searchInput').value.toLowerCase().trim();
  var list = document.getElementById('recipeList');
  var filtered = recipes.filter(function(r) {
    var rCatsF = Array.isArray(r.categories) ? r.categories : (r.category ? [r.category] : []);
    var matchCat = activeCategory === 'All' || rCatsF.indexOf(activeCategory) !== -1;
    var matchQ = !q || r.title.toLowerCase().indexOf(q) !== -1 || (r.category || '').toLowerCase().indexOf(q) !== -1;
    return matchCat && matchQ;
  });
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📖</div><div class="empty-title">' + (recipes.length ? 'No matches' : 'No recipes yet') + '</div><div class="empty-sub">' + (recipes.length ? 'Try a different category' : 'Tap + to scan your first recipe') + '</div></div>';
    return;
  }
  list.innerHTML = filtered.map(function(r) {
    var cats = Array.isArray(r.categories) && r.categories.length ? r.categories : (r.category ? [r.category] : []);
    var tagHtml = cats.slice(0, 2).map(function(c) { return '<span class="recipe-cat-tag">' + c + '</span>'; }).join('');
    var cardThumb = r.photo ? '<img src="' + r.photo + '" style="width:52px;height:52px;object-fit:cover;border-radius:8px;flex-shrink:0;margin-left:12px">' : '';
    return '<div class="recipe-card" data-id="' + r.id + '" style="display:flex;align-items:center"><div style="flex:1;min-width:0"><div class="recipe-card-header"><div class="recipe-card-title">' + r.title + '</div><div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;flex-shrink:0">' + tagHtml + '</div></div><div class="recipe-card-meta">' + r.ingredients.length + ' ingredients · ' + r.method.length + ' steps</div></div>' + cardThumb + '</div>';
  }).join('');
  document.querySelectorAll('.recipe-card').forEach(function(card) {
    card.addEventListener('click', function() { openRecipe(this.dataset.id); });
  });
}

function openRecipe(id) {
  var r = null;
  for (var i = 0; i < recipes.length; i++) { if (recipes[i].id === id) { r = recipes[i]; break; } }
  if (!r) return;
  currentRecipeId = id;
  document.getElementById('detailLabel').textContent = r.category || 'Recipe';
  document.getElementById('detailHeaderTitle').textContent = r.title;
  var ingHtml = r.ingredients.map(function(ing) { return '<div class="ingredient-row"><div class="ingredient-dot"></div><div class="ingredient-text">' + ing + '</div></div>'; }).join('');
  var methHtml = r.method.map(function(s, i) { return '<div class="method-row"><div class="step-num">0' + (i + 1) + '</div><div class="step-text">' + s + '</div></div>'; }).join('');
  var rCats2 = Array.isArray(r.categories) ? r.categories : (r.category ? [r.category] : []);
  var detChips = categories.map(function(c) {
    return '<button class="det-cat-chip' + (rCats2.indexOf(c) !== -1 ? ' selected' : '') + '" data-cat="' + c + '">' + c + '</button>';
  }).join('');
  var catSection = categories.length ? '<div style="margin-bottom:20px"><div style="font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(240,235,227,0.35);margin-bottom:10px">Categories</div><div class="cat-chips-wrap">' + detChips + '</div><button id="saveCatBtn" style="margin-top:10px;background:rgba(201,169,110,0.15);border:1px solid rgba(201,169,110,0.3);color:#c9a96e;border-radius:8px;padding:7px 16px;font-family:DM Sans,sans-serif;font-size:12px;cursor:pointer">Save categories</button></div>' : '';
  document.getElementById('detailBody').innerHTML = '<div class="detail-full-title">' + r.title + '</div>' + photoHtml + catSection + '<div class="detail-section"><div class="detail-section-header"><div class="detail-section-label">Ingredients</div><div class="detail-section-line"></div></div>' + ingHtml + '</div><div class="detail-section"><div class="detail-section-header"><div class="detail-section-label">Method</div><div class="detail-section-line"></div></div>' + methHtml + '</div>';
  if (categories.length) {
    document.querySelectorAll('.det-cat-chip').forEach(function(chip) {
      chip.addEventListener('click', function() { this.classList.toggle('selected'); });
    });
    document.getElementById('saveCatBtn').addEventListener('click', function() {
      var selected = [];
      document.querySelectorAll('.det-cat-chip.selected').forEach(function(chip) { selected.push(chip.dataset.cat); });
      for (var i = 0; i < recipes.length; i++) {
        if (recipes[i].id === currentRecipeId) { recipes[i].categories = selected; recipes[i].category = selected[0] || ''; break; }
      }
      persist();
      document.getElementById('detailLabel').textContent = selected.join(', ') || 'Recipe';
    });
  }
  document.getElementById('notesField').value = r.notes || '';
  document.getElementById('notesSection').style.display = 'block';
  document.getElementById('saveNotesBtn').textContent = 'Save notes';
  showScreen('detailScreen');
}

function deleteCurrentRecipe() {
  if (!currentRecipeId) return;
  var newRecipes = [];
  for (var i = 0; i < recipes.length; i++) { if (recipes[i].id !== currentRecipeId) newRecipes.push(recipes[i]); }
  recipes = newRecipes;
  persist();
  showScreen('homeScreen');
}

function resetScan() {
  currentB64 = null; pendingRecipe = null;
  document.getElementById('uploadZone').style.display = 'block';
  document.getElementById('previewSection').style.display = 'none';
  document.getElementById('scanStatus').style.display = 'none';
  document.getElementById('scanError').style.display = 'none';
  document.getElementById('extractedSection').style.display = 'none';
  document.getElementById('extractedSection').innerHTML = '';
  document.getElementById('fileInput').value = '';
}

function handleFile(file) {
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function() {
    var img = new Image();
    img.onload = function() {
      var scale = Math.min(1, 800 / Math.max(img.width, img.height));
      var canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      var compressed = canvas.toDataURL('image/jpeg', 0.7);
      currentB64 = compressed.split(',')[1];
      document.getElementById('uploadZone').style.display = 'none';
      document.getElementById('previewSection').style.display = 'block';
      document.getElementById('previewImg').src = compressed;
      document.getElementById('previewMeta').textContent = file.name + ' · ~' + Math.round(currentB64.length * 0.75 / 1024) + 'KB';
      document.getElementById('scanError').style.display = 'none';
      document.getElementById('extractedSection').style.display = 'none';
      document.getElementById('extractedSection').innerHTML = '';
      pendingRecipe = null;
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}

function scanRecipe() {
  if (!currentB64) { document.getElementById('scanError').style.display = 'block'; document.getElementById('scanError').textContent = 'Please select a photo first.'; return; }
  var btn = document.getElementById('scanBtn');
  var status = document.getElementById('scanStatus');
  var errEl = document.getElementById('scanError');
  btn.disabled = true; btn.textContent = 'Reading…';
  status.style.display = 'block'; status.textContent = 'Sending to Claude…';
  errEl.style.display = 'none';
  var xhr = new XMLHttpRequest();
  xhr.open('POST', window.location.origin + '/api/scan', true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onload = function() {
    var data;
    try { data = JSON.parse(xhr.responseText); } catch(e) { showErr('Unexpected: ' + xhr.responseText.slice(0, 100)); return; }
    if (data.error) { showErr(data.error); return; }
    if (!data.recipe) { showErr('No recipe returned'); return; }
    pendingRecipe = data.recipe;
    status.style.display = 'none';
    showExtracted(pendingRecipe);
    btn.disabled = false; btn.textContent = '✦ Extract Recipe';
  };
  xhr.onerror = function() { showErr('Network error'); };
  xhr.send(JSON.stringify({ imageBase64: currentB64, mediaType: 'image/jpeg' }));
  function showErr(msg) { status.style.display = 'none'; errEl.style.display = 'block'; errEl.textContent = '⚠️ ' + msg; btn.disabled = false; btn.textContent = '✦ Extract Recipe'; }
}

function showExtracted(r) {
  var sec = document.getElementById('extractedSection');
  sec.style.display = 'block';
  var rCats = Array.isArray(r.categories) ? r.categories : (r.category ? [r.category] : []);
  var catChips = categories.map(function(c) {
    return '<button class="ext-cat-chip' + (rCats.indexOf(c) !== -1 ? ' selected' : '') + '" data-cat="' + c + '">' + c + '</button>';
  }).join('');
  var catHtml = categories.length ? '<div style="margin-bottom:16px"><div class="ext-section-label" style="margin-top:0">Categories</div><div class="cat-chips-wrap">' + catChips + '</div></div>' : '';
  var ingHtml = r.ingredients.map(function(ing) { return '<div class="ext-item">· ' + ing + '</div>'; }).join('');
  var methHtml = r.method.map(function(s, i) { return '<div class="ext-item">' + (i + 1) + '. ' + s + '</div>'; }).join('');
  sec.innerHTML = '<div class="extracted-card"><div class="ext-label">Extracted Recipe</div><div class="ext-title">' + r.title + '</div>' + catHtml + '<div class="ext-section-label">Ingredients</div>' + ingHtml + '<div class="ext-section-label">Method</div>' + methHtml + '<button class="save-btn" id="saveBtn">✓ Save to My Recipes</button></div>';
  document.querySelectorAll('.ext-cat-chip').forEach(function(chip) {
    chip.addEventListener('click', function() { this.classList.toggle('selected'); });
  });
  document.getElementById('saveBtn').addEventListener('click', saveRecipe);
}

function saveRecipe() {
  if (!pendingRecipe) return;
  var selectedCats = [];
  document.querySelectorAll('.ext-cat-chip.selected').forEach(function(chip) { selectedCats.push(chip.dataset.cat); });
  var recipe = { title: pendingRecipe.title, categories: selectedCats, category: selectedCats[0] || '', ingredients: pendingRecipe.ingredients, method: pendingRecipe.method, notes: '', id: Date.now().toString(), savedAt: new Date().toISOString() };
  recipes.unshift(recipe);
  persist();
  showScreen('homeScreen');
}

try { renderList(); } catch(e) { console.error('renderList error:', e); }
</script>
</body>
</html>
