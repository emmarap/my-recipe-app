<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0e0c">
<title>My Recipes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'DM Sans', sans-serif; background: #0f0e0c; color: #f0ebe3; }
.screen { position: fixed; inset: 0; display: flex; flex-direction: column; overflow: hidden; transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s; }
.screen.hidden { transform: translateX(100%); opacity: 0; pointer-events: none; }

/* ── SHARED ── */
.top-bar { padding: 56px 24px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; border-bottom: 1px solid rgba(240,235,227,0.07); }
.back-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(240,235,227,0.06); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #f0ebe3; flex-shrink: 0; }
.top-bar-text { flex: 1; min-width: 0; }
.top-bar-label { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: #c9a96e; font-weight: 500; margin-bottom: 3px; }
.top-bar-title { font-family: ‘Playfair Display’, serif; font-size: 24px; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.scrollable { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.scrollable::-webkit-scrollbar { display: none; }
.icon-btn { width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }

/* ── HOME ── */
.home-header { padding: 56px 24px 20px; border-bottom: 1px solid rgba(240,235,227,0.07); flex-shrink: 0; }
.home-header-top { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 20px; }
.home-label { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: #c9a96e; margin-bottom: 6px; font-weight: 500; }
.home-title { font-family: ‘Playfair Display’, serif; font-size: 34px; font-weight: 400; line-height: 1; }
.home-title em { font-style: italic; color: #c9a96e; }
.add-btn { width: 44px; height: 44px; background: #c9a96e; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #0f0e0c; flex-shrink: 0; }
.search-bar { position: relative; }
.search-input { width: 100%; background: rgba(240,235,227,0.06); border: 1px solid rgba(240,235,227,0.1); border-radius: 12px; padding: 12px 16px 12px 40px; color: #f0ebe3; font-family: ‘DM Sans’, sans-serif; font-size: 14px; outline: none; }
.search-input::placeholder { color: rgba(240,235,227,0.25); }
.search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 16px; opacity: 0.3; pointer-events: none; }
.categories { display: flex; gap: 8px; padding: 14px 24px; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; align-items: center; }
.categories::-webkit-scrollbar { display: none; }
.cat-btn { flex-shrink: 0; padding: 7px 14px; border-radius: 20px; border: 1px solid rgba(240,235,227,0.12); background: transparent; color: rgba(240,235,227,0.5); font-family: ‘DM Sans’, sans-serif; font-size: 12px; cursor: pointer; white-space: nowrap; }
.cat-btn.active { background: #c9a96e; border-color: #c9a96e; color: #0f0e0c; font-weight: 500; }
.cat-manage-btn { flex-shrink: 0; width: 30px; height: 30px; border-radius: 50%; border: 1px dashed rgba(240,235,227,0.2); background: transparent; color: rgba(240,235,227,0.3); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.recipe-list { padding: 8px 24px 100px; }
.empty-state { text-align: center; padding: 80px 40px; }
.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
.empty-title { font-family: ‘Playfair Display’, serif; font-size: 20px; font-weight: 400; margin-bottom: 8px; color: rgba(240,235,227,0.5); }
.empty-sub { font-size: 13px; color: rgba(240,235,227,0.25); line-height: 1.6; }
.recipe-card { background: rgba(240,235,227,0.04); border-radius: 14px; padding: 16px; margin-bottom: 10px; cursor: pointer; border: 1px solid rgba(240,235,227,0.06); }
.recipe-card:active { background: rgba(240,235,227,0.08); }
.recipe-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.recipe-card-title { font-family: ‘Playfair Display’, serif; font-size: 18px; font-weight: 700; line-height: 1.2; flex: 1; }
.recipe-cat-tag { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #c9a96e; background: rgba(201,169,110,0.1); border-radius: 6px; padding: 3px 8px; white-space: nowrap; flex-shrink: 0; margin-top: 3px; }
.recipe-card-meta { font-size: 12px; color: rgba(240,235,227,0.3); margin-top: 6px; }
.recipe-thumb { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }

/* ── SCAN ── */
.upload-zone { border: 1.5px dashed rgba(201,169,110,0.35); border-radius: 16px; padding: 40px 20px; text-align: center; cursor: pointer; background: rgba(201,169,110,0.03); display: block; margin-bottom: 20px; }
.upload-icon { width: 56px; height: 56px; background: rgba(201,169,110,0.12); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; font-size: 24px; }
.upload-zone h3 { font-family: ‘Playfair Display’, serif; font-size: 18px; font-weight: 400; margin-bottom: 6px; }
.upload-zone p { font-size: 12px; color: rgba(240,235,227,0.4); }
.preview-img { width: 100%; max-height: 240px; object-fit: cover; border-radius: 14px; display: block; margin-bottom: 12px; }
.preview-meta { font-size: 12px; color: rgba(240,235,227,0.35); text-align: center; margin-bottom: 12px; }
.change-link { display: block; text-align: center; font-size: 12px; color: rgba(201,169,110,0.6); cursor: pointer; margin-bottom: 20px; text-decoration: underline; }
.primary-btn { width: 100%; background: #c9a96e; color: #0f0e0c; border: none; border-radius: 13px; padding: 17px; font-family: ‘DM Sans’, sans-serif; font-size: 14px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
.primary-btn:disabled { opacity: 0.45; cursor: not-allowed; }
.spinner { width: 17px; height: 17px; border: 2px solid rgba(15,14,12,0.25); border-top-color: #0f0e0c; border-radius: 50%; animation: spin 0.9s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
.status-msg { text-align: center; font-size: 13px; color: rgba(240,235,227,0.4); margin-top: 14px; }
.error-msg { background: rgba(220,80,60,0.1); border: 1px solid rgba(220,80,60,0.3); border-radius: 12px; padding: 14px; font-size: 13px; color: rgba(240,235,227,0.8); margin-top: 16px; line-height: 1.6; word-break: break-word; }
.extracted-card { margin-top: 24px; background: rgba(240,235,227,0.04); border-radius: 16px; padding: 20px; border: 1px solid rgba(240,235,227,0.08); }
.ext-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #c9a96e; margin-bottom: 6px; }
.ext-title { font-family: ‘Playfair Display’, serif; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.ext-cat { font-size: 11px; color: rgba(201,169,110,0.7); margin-bottom: 16px; }
.ext-section-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(240,235,227,0.35); margin-bottom: 8px; margin-top: 14px; }
.ext-item { font-size: 13px; color: rgba(240,235,227,0.7); line-height: 1.6; padding: 4px 0; border-bottom: 1px solid rgba(240,235,227,0.04); }
.save-btn { width: 100%; background: #c9a96e; color: #0f0e0c; border: none; border-radius: 13px; padding: 16px; font-family: ‘DM Sans’, sans-serif; font-size: 14px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; margin-top: 20px; }

/* ── DETAIL / EDIT ── */
.detail-body { padding: 24px 24px 100px; }
.det-section { margin-bottom: 28px; }
.det-section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.det-section-label { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: #c9a96e; font-weight: 500; }
.det-section-line { flex: 1; height: 1px; background: rgba(201,169,110,0.18); }
.ingredient-row { display: flex; align-items: flex-start; gap: 12px; padding: 11px 13px; background: rgba(240,235,227,0.04); border-radius: 9px; border-left: 2px solid rgba(201,169,110,0.35); margin-bottom: 8px; }
.ingredient-dot { width: 5px; height: 5px; background: #c9a96e; border-radius: 50%; margin-top: 7px; flex-shrink: 0; }
.ingredient-text { font-size: 14px; line-height: 1.5; color: rgba(240,235,227,0.82); font-weight: 300; flex: 1; }
.method-row { display: flex; gap: 13px; margin-bottom: 14px; }
.step-num { font-family: ‘Playfair Display’, serif; font-size: 20px; color: rgba(201,169,110,0.28); font-weight: 700; line-height: 1; min-width: 26px; padding-top: 2px; flex-shrink: 0; }
.step-text { font-size: 14px; line-height: 1.7; color: rgba(240,235,227,0.78); font-weight: 300; padding-bottom: 13px; border-bottom: 1px solid rgba(240,235,227,0.05); flex: 1; }
.method-row:last-child .step-text { border-bottom: none; }
.notes-box { width: 100%; background: rgba(240,235,227,0.05); border: 1px solid rgba(240,235,227,0.1); border-radius: 12px; padding: 14px; color: #f0ebe3; font-family: ‘DM Sans’, sans-serif; font-size: 14px; line-height: 1.6; resize: none; min-height: 100px; outline: none; }
.notes-box::placeholder { color: rgba(240,235,227,0.2); }
.photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
.photo-thumb { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 10px; cursor: pointer; }
.add-photo-btn { width: 100%; aspect-ratio: 1; border-radius: 10px; border: 1.5px dashed rgba(201,169,110,0.3); background: rgba(201,169,110,0.04); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; gap: 4px; color: rgba(201,169,110,0.5); font-size: 11px; }
.add-photo-btn span { font-size: 22px; }
.det-title-input { font-family: ‘Playfair Display’, serif; font-size: 26px; font-weight: 700; background: none; border: none; border-bottom: 1px solid rgba(240,235,227,0.1); color: #f0ebe3; width: 100%; padding-bottom: 8px; margin-bottom: 8px; outline: none; }
.cat-select { background: rgba(201,169,110,0.1); border: 1px solid rgba(201,169,110,0.2); border-radius: 8px; color: #c9a96e; font-family: ‘DM Sans’, sans-serif; font-size: 12px; padding: 5px 10px; margin-bottom: 24px; outline: none; }
.cat-select option { background: #1a1917; color: #f0ebe3; }
.editable-list { margin-bottom: 8px; }
.editable-item { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
.editable-item textarea { flex: 1; background: rgba(240,235,227,0.05); border: 1px solid rgba(240,235,227,0.08); border-radius: 8px; padding: 8px 10px; color: #f0ebe3; font-family: ‘DM Sans’, sans-serif; font-size: 13px; line-height: 1.5; resize: none; outline: none; min-height: 36px; }
.editable-item textarea:focus { border-color: rgba(201,169,110,0.3); }
.remove-item-btn { width: 28px; height: 28px; border-radius: 50%; background: rgba(220,80,60,0.1); border: none; color: rgba(220,80,60,0.5); font-size: 16px; cursor: pointer; flex-shrink: 0; margin-top: 4px; display: flex; align-items: center; justify-content: center; }
.add-item-btn { font-size: 12px; color: rgba(201,169,110,0.6); background: none; border: 1px dashed rgba(201,169,110,0.2); border-radius: 8px; padding: 7px 12px; cursor: pointer; font-family: ‘DM Sans’, sans-serif; margin-top: 4px; }
.save-changes-btn { width: 100%; background: #c9a96e; color: #0f0e0c; border: none; border-radius: 13px; padding: 16px; font-family: ‘DM Sans’, sans-serif; font-size: 14px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; margin-top: 8px; }
.delete-recipe-btn { width: 100%; background: none; border: 1px solid rgba(220,80,60,0.2); color: rgba(220,80,60,0.5); border-radius: 13px; padding: 14px; font-family: ‘DM Sans’, sans-serif; font-size: 13px; cursor: pointer; margin-top: 10px; }
.det-cat-tag { display: inline-block; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #c9a96e; background: rgba(201,169,110,0.1); border-radius: 6px; padding: 4px 10px; margin-bottom: 20px; }
.edit-btn { background: rgba(240,235,227,0.06); }

/* ── MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
.modal-overlay.hidden { display: none; }
.modal { background: #1a1917; border-radius: 20px 20px 0 0; padding: 28px 24px 40px; width: 100%; max-width: 430px; }
.modal h3 { font-family: ‘Playfair Display’, serif; font-size: 20px; font-weight: 400; margin-bottom: 20px; }
.modal-input { width: 100%; background: rgba(240,235,227,0.06); border: 1px solid rgba(240,235,227,0.12); border-radius: 10px; padding: 12px 14px; color: #f0ebe3; font-family: ‘DM Sans’, sans-serif; font-size: 14px; outline: none; margin-bottom: 12px; }
.modal-btn { width: 100%; background: #c9a96e; color: #0f0e0c; border: none; border-radius: 12px; padding: 15px; font-family: ‘DM Sans’, sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; margin-bottom: 10px; }
.modal-cancel { width: 100%; background: none; border: none; color: rgba(240,235,227,0.4); font-family: ‘DM Sans’, sans-serif; font-size: 14px; cursor: pointer; padding: 10px; }
.cat-manage-list { margin-bottom: 16px; }
.cat-manage-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(240,235,227,0.06); font-size: 14px; }
.cat-delete-btn { background: none; border: none; color: rgba(220,80,60,0.4); font-size: 18px; cursor: pointer; }

/* ── PHOTO VIEWER ── */
.photo-viewer { position: fixed; inset: 0; background: #000; z-index: 200; display: flex; align-items: center; justify-content: center; flex-direction: column; }
.photo-viewer.hidden { display: none; }
.photo-viewer img { max-width: 100%; max-height: 80vh; object-fit: contain; }
.photo-viewer-close { position: absolute; top: 50px; right: 20px; background: rgba(255,255,255,0.1); border: none; color: #fff; font-size: 24px; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.photo-viewer-del { position: absolute; bottom: 50px; background: rgba(220,80,60,0.3); border: 1px solid rgba(220,80,60,0.5); color: #fff; font-size: 13px; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
</style>

</head>
<body>

<!-- HOME -->

<div class="screen" id="homeScreen">
  <div class="home-header">
    <div class="home-header-top">
      <div>
        <div class="home-label">Your Collection</div>
        <h1 class="home-title">My <em>Recipes</em></h1>
      </div>
      <button class="add-btn" id="addBtn">+</button>
    </div>
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" type="search" placeholder="Search recipes…">
    </div>
  </div>
  <div class="categories" id="categoryBar"></div>
  <div class="scrollable"><div class="recipe-list" id="recipeList"></div></div>
</div>

<!-- SCAN -->

<div class="screen hidden" id="scanScreen">
  <div class="top-bar">
    <button class="back-btn" id="scanBackBtn">←</button>
    <div class="top-bar-text">
      <div class="top-bar-label">New Recipe</div>
      <div class="top-bar-title">Scan a photo</div>
    </div>
  </div>
  <div class="scrollable" style="padding:24px">
    <label class="upload-zone" id="uploadZone">
      <input type="file" accept="image/*" id="fileInput" style="display:none">
      <div class="upload-icon">📷</div>
      <h3>Upload a recipe photo</h3>
      <p>Tap to choose from your library</p>
    </label>
    <div id="previewSection" style="display:none">
      <img class="preview-img" id="previewImg" src="" alt="">
      <div class="preview-meta" id="previewMeta"></div>
      <label class="change-link">Change photo<input type="file" accept="image/*" id="changeInput" style="display:none"></label>
      <button class="primary-btn" id="scanBtn">✦ Extract Recipe</button>
    </div>
    <div class="status-msg" id="scanStatus" style="display:none"></div>
    <div class="error-msg" id="scanError" style="display:none"></div>
    <div id="extractedSection" style="display:none"></div>
  </div>
</div>

<!-- DETAIL -->

<div class="screen hidden" id="detailScreen">
  <div class="top-bar">
    <button class="back-btn" id="detailBackBtn">←</button>
    <div class="top-bar-text">
      <div class="top-bar-label" id="detailLabel"></div>
      <div class="top-bar-title" id="detailHeaderTitle"></div>
    </div>
    <button class="icon-btn edit-btn" id="editToggleBtn">✏️</button>
    <button class="icon-btn" style="background:rgba(220,80,60,0.1)" id="deleteBtn">🗑</button>
  </div>
  <div class="scrollable"><div class="detail-body" id="detailBody"></div></div>
</div>

<!-- CATEGORY MODAL -->

<div class="modal-overlay hidden" id="catModal">
  <div class="modal">
    <h3>Manage Categories</h3>
    <div class="cat-manage-list" id="catManageList"></div>
    <input class="modal-input" id="newCatInput" placeholder="New category name…">
    <button class="modal-btn" id="addCatBtn">Add Category</button>
    <button class="modal-cancel" id="catModalClose">Done</button>
  </div>
</div>

<!-- PHOTO VIEWER -->

<div class="photo-viewer hidden" id="photoViewer">
  <button class="photo-viewer-close" id="photoViewerClose">✕</button>
  <img id="photoViewerImg" src="" alt="">
  <button class="photo-viewer-del" id="photoViewerDel">Delete Photo</button>
</div>

<script>
var recipes = [];
var categories = [];
var activeCategory = 'All';
var currentRecipeId = null;
var currentB64 = null;
var pendingRecipe = null;
var editMode = false;
var viewingPhotoIndex = -1;

var savedRecipes = localStorage.getItem("recipes"); try { recipes = savedRecipes ? JSON.parse(savedRecipes) : []; recipes = recipes.map(function(r) { return { id: r.id || Date.now().toString(), title: r.title || "Untitled", category: r.category || "", ingredients: r.ingredients || [], method: r.method || [], notes: r.notes || "", photos: r.photos || [], savedAt: r.savedAt || new Date().toISOString() }; }); } catch(e) { recipes = []; } // original: try {
  var savedR = localStorage.getItem('recipes');
  recipes = savedR ? JSON.parse(savedR) : [];
  recipes = recipes.map(function(r) {
    return {
      id: r.id || String(Date.now()),
      title: r.title || 'Untitled',
      category: r.category || '',
      ingredients: Array.isArray(r.ingredients) ? r.ingredients : [],
      method: Array.isArray(r.method) ? r.method : [],
      notes: r.notes || '',
      photos: Array.isArray(r.photos) ? r.photos : [],
      savedAt: r.savedAt || new Date().toISOString()
    };
  });
} catch(e) { recipes = []; }
try {
  var savedC = localStorage.getItem('categories');
  categories = savedC ? JSON.parse(savedC) : [];
} catch(e) { categories = []; }

function save() {
  localStorage.setItem('recipes', JSON.stringify(recipes));
  localStorage.setItem('categories', JSON.stringify(categories));
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.toggle('hidden', s.id !== id); });
  if (id === 'homeScreen') { editMode = false; renderList(); }
  if (id === 'scanScreen') resetScan();
}

// ── HOME ──
function buildCategories() {
  var bar = document.getElementById('categoryBar');
  var allBtn = '<button class="cat-btn ' + (activeCategory==='All'?'active':'') + '" data-cat="All">All</button>';
  var catBtns = categories.map(function(c) {
    return '<button class="cat-btn ' + (activeCategory===c?'active':'') + '" data-cat="' + c + '">' + c + '</button>';
  }).join('');
  var manageBtn = '<button class="cat-manage-btn" id="manageCatsBtn">+</button>';
  bar.innerHTML = allBtn + catBtns + manageBtn;
  bar.querySelectorAll('.cat-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { activeCategory = this.dataset.cat; renderList(); });
  });
  document.getElementById('manageCatsBtn').addEventListener('click', openCatModal);
}

function renderList() {
  buildCategories();
  var q = document.getElementById('searchInput').value.toLowerCase().trim();
  var list = document.getElementById('recipeList');
  var filtered = recipes.filter(function(r) {
    var matchCat = activeCategory === 'All' || r.category === activeCategory;
    var matchQ = !q || r.title.toLowerCase().indexOf(q) !== -1 || (r.category||'').toLowerCase().indexOf(q) !== -1;
    return matchCat && matchQ;
  });
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📖</div><div class="empty-title">' + (recipes.length ? 'No matches' : 'No recipes yet') + '</div><div class="empty-sub">' + (recipes.length ? 'Try a different category' : 'Tap + to scan your first recipe') + '</div></div>';
    return;
  }
  list.innerHTML = filtered.map(function(r) {
    var thumb = (r.photos && r.photos.length) ? '<img class="recipe-thumb" src="' + r.photos[0] + '">' : '';
    return '<div class="recipe-card" data-id="' + r.id + '" style="display:flex;gap:12px;align-items:center"><div style="flex:1"><div class="recipe-card-header"><div class="recipe-card-title">' + r.title + '</div><span class="recipe-cat-tag">' + (r.category||'') + '</span></div><div class="recipe-card-meta">' + r.ingredients.length + ' ingredients · ' + r.method.length + ' steps</div></div>' + thumb + '</div>';
  }).join('');

// ── SCAN ──
function resetScan() {
currentB64 = null; pendingRecipe = null;
document.getElementById(‘uploadZone’).style.display = ‘block’;
document.getElementById(‘previewSection’).style.display = ‘none’;
document.getElementById(‘scanStatus’).style.display = ‘none’;
document.getElementById(‘scanError’).style.display = ‘none’;
document.getElementById(‘extractedSection’).style.display = ‘none’;
document.getElementById(‘extractedSection’).innerHTML = ‘’;
document.getElementById(‘fileInput’).value = ‘’;
}

function handleFile(file) {
if (!file) return;
var reader = new FileReader();
reader.onload = function() {
var img = new Image();
img.onload = function() {
var maxPx = 800;
var scale = Math.min(1, maxPx / Math.max(img.width, img.height));
var canvas = document.createElement(‘canvas’);
canvas.width = Math.round(img.width * scale);
canvas.height = Math.round(img.height * scale);
canvas.getContext(‘2d’).drawImage(img, 0, 0, canvas.width, canvas.height);
var compressed = canvas.toDataURL(‘image/jpeg’, 0.7);
currentB64 = compressed.split(’,’)[1];
document.getElementById(‘uploadZone’).style.display = ‘none’;
document.getElementById(‘previewSection’).style.display = ‘block’;
document.getElementById(‘previewImg’).src = compressed;
document.getElementById(‘previewMeta’).textContent = file.name + ’ · ~’ + Math.round(currentB64.length * 0.75 / 1024) + ‘KB’;
document.getElementById(‘scanError’).style.display = ‘none’;
document.getElementById(‘extractedSection’).style.display = ‘none’;
document.getElementById(‘extractedSection’).innerHTML = ‘’;
pendingRecipe = null;
};
img.src = reader.result;
};
reader.readAsDataURL(file);
}

function scanRecipe() {
if (!currentB64) { document.getElementById(‘scanError’).style.display = ‘block’; document.getElementById(‘scanError’).textContent = ‘Please select a photo first.’; return; }
var btn = document.getElementById(‘scanBtn’);
var status = document.getElementById(‘scanStatus’);
var errEl = document.getElementById(‘scanError’);
btn.disabled = true;
btn.textContent = ‘Reading…’;
status.style.display = ‘block’;
status.textContent = ‘Sending to Claude…’;
errEl.style.display = ‘none’;

var xhr = new XMLHttpRequest();
xhr.open(‘POST’, window.location.origin + ‘/api/scan’, true);
xhr.setRequestHeader(‘Content-Type’, ‘application/json’);
xhr.onload = function() {
var data;
try { data = JSON.parse(xhr.responseText); } catch(e) { showScanErr(’Unexpected: ’ + xhr.responseText.slice(0,100)); return; }
if (data.error) { showScanErr(data.error); return; }
if (!data.recipe) { showScanErr(’No recipe returned: ’ + xhr.responseText.slice(0,150)); return; }
pendingRecipe = data.recipe;
status.style.display = ‘none’;
showExtracted(pendingRecipe);
btn.disabled = false; btn.textContent = ‘✦ Extract Recipe’;
};
xhr.onerror = function() { showScanErr(‘Network error’); };
xhr.send(JSON.stringify({ imageBase64: currentB64, mediaType: ‘image/jpeg’ }));

function showScanErr(msg) {
status.style.display = ‘none’;
errEl.style.display = ‘block’;
errEl.textContent = ’⚠️ ’ + msg;
btn.disabled = false; btn.textContent = ‘✦ Extract Recipe’;
}
}

function showExtracted(r) {
var sec = document.getElementById(‘extractedSection’);
sec.style.display = ‘block’;
var catOptions = ‘<option value="">No category</option>’ + categories.map(function(c) { return ‘<option value=”’ + c + ‘”’ + (r.category===c?’ selected’:’’) + ‘>’ + c + ‘</option>’; }).join(’’);
sec.innerHTML = ‘<div class="extracted-card"><div class="ext-label">Extracted Recipe</div>’ +
‘<input style="font-family:Playfair Display,serif;font-size:20px;font-weight:700;background:none;border:none;border-bottom:1px solid rgba(240,235,227,0.1);color:#f0ebe3;width:100%;padding-bottom:6px;margin-bottom:8px;outline:none" id="extTitleInput" value="' + r.title + '">’ +
‘<select class="cat-select" id="extCatSelect" style="margin-bottom:12px">’ + catOptions + ‘</select>’ +
‘<div class="ext-section-label">Ingredients</div>’ +
r.ingredients.map(function(i) { return ‘<div class="ext-item">· ’ + i + ‘</div>’; }).join(’’) +
‘<div class="ext-section-label">Method</div>’ +
r.method.map(function(s, i) { return ‘<div class="ext-item">’ + (i+1) + ‘. ’ + s + ‘</div>’; }).join(’’) +
‘<button class="save-btn" id="savePendingBtn">✓ Save to My Recipes</button></div>’;
document.getElementById(‘savePendingBtn’).addEventListener(‘click’, savePending);
}

function savePending() {
if (!pendingRecipe) return;
var title = document.getElementById(‘extTitleInput’).value.trim() || pendingRecipe.title;
var category = document.getElementById(‘extCatSelect’).value;
var recipe = { title: title, category: category, ingredients: pendingRecipe.ingredients, method: pendingRecipe.method, notes: ‘’, photos: [], id: Date.now().toString(), savedAt: new Date().toISOString() };
recipes.unshift(recipe);
save();
showScreen(‘homeScreen’);
}
