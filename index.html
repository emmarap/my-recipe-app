<!DOCTYPE html>
<!-- v4 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#f8f8f6">
<title>Rapaport Recipes</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Lora', serif; background: #f8f8f6; color: #1a1a1a; }
.screen { position: fixed; inset: 0; display: flex; flex-direction: column; overflow: hidden; transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s; }
.screen.hidden { transform: translateX(100%); opacity: 0; pointer-events: none; }
#homeScreen { background: #f8f8f6; }
.home-header { padding: 56px 24px 20px; border-bottom: 1px solid rgba(0,0,0,0.06); flex-shrink: 0; }
.home-header-top { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 20px; }
.home-label { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: #4a7c59; margin-bottom: 6px; font-weight: 500; }
.home-title { font-family: 'Cormorant Garant', serif; font-size: 34px; font-weight: 400; line-height: 1; }
.home-title em { font-style: italic; color: #4a7c59; }
.add-btn { width: 44px; height: 44px; background: #4a7c59; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #f8f8f6; flex-shrink: 0; }
.search-bar { position: relative; }
.search-input { width: 100%; background: rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.08); border-radius: 12px; padding: 12px 16px 12px 40px; color: #1a1a1a; font-family: 'Lora', serif; font-size: 14px; outline: none; }
.search-input::placeholder { color: rgba(0,0,0,0.2); }
.search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 16px; opacity: 0.3; pointer-events: none; }
.categories { display: flex; gap: 8px; padding: 16px 24px; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
.categories::-webkit-scrollbar { display: none; }
.cat-btn { flex-shrink: 0; padding: 7px 14px; border-radius: 20px; border: 1px solid rgba(0,0,0,0.1); background: transparent; color: rgba(0,0,0,0.45); font-family: 'Lora', serif; font-size: 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.cat-btn.active { background: #4a7c59; border-color: #4a7c59; color: #f8f8f6; font-weight: 500; }
.cat-add-btn { flex-shrink: 0; padding: 6px 12px; border-radius: 20px; border: 1px dashed rgba(0,0,0,0.15); background: transparent; color: rgba(0,0,0,0.25); font-family: 'Lora', serif; font-size: 12px; cursor: pointer; white-space: nowrap; }
.recipe-list { flex: 1; overflow-y: auto; padding: 8px 16px 100px; }
.recipe-list::-webkit-scrollbar { display: none; }
.empty-state { text-align: center; padding: 80px 40px; }
.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
.empty-title { font-family: 'Cormorant Garant', serif; font-size: 20px; font-weight: 400; margin-bottom: 8px; color: rgba(0,0,0,0.45); }
.empty-sub { font-size: 13px; color: rgba(0,0,0,0.2); line-height: 1.6; }
.recipe-list-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.recipe-card { background: rgba(0,0,0,0.03); border-radius: 14px; cursor: pointer; border: 1px solid rgba(0,0,0,0.05); overflow: hidden; }
.recipe-card:active { background: rgba(0,0,0,0.07); }
.recipe-card-img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
.recipe-card-no-img { width: 100%; aspect-ratio: 1; background: rgba(0,0,0,0.03); display: flex; align-items: center; justify-content: center; font-size: 36px; opacity: 0.3; }
.recipe-card-body { padding: 10px 12px 12px; }
.recipe-card-title { font-family: 'Cormorant Garant', serif; font-size: 15px; font-weight: 700; line-height: 1.3; }
.recipe-cat-tag { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: #4a7c59; background: rgba(74,124,89,0.1); border-radius: 6px; padding: 2px 6px; white-space: nowrap; display: inline-block; margin-top: 5px; }
.recipe-card-meta { font-size: 11px; color: rgba(0,0,0,0.25); margin-top: 4px; }
#scanScreen { background: #f8f8f6; }
.scan-header { padding: 56px 24px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; border-bottom: 1px solid rgba(0,0,0,0.06); }
.back-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(0,0,0,0.05); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #1a1a1a; }
.scan-header-text .scan-label { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: #4a7c59; font-weight: 500; }
.scan-header-text h2 { font-family: 'Cormorant Garant', serif; font-size: 24px; font-weight: 400; }
.scan-body { flex: 1; overflow-y: auto; padding: 24px; }
.scan-body::-webkit-scrollbar { display: none; }
.upload-zone { border: 1.5px dashed rgba(74,124,89,0.35); border-radius: 16px; padding: 40px 20px; text-align: center; cursor: pointer; background: rgba(74,124,89,0.03); display: block; margin-bottom: 20px; }
.upload-icon { width: 56px; height: 56px; background: rgba(74,124,89,0.12); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; font-size: 24px; }
.upload-zone h3 { font-family: 'Cormorant Garant', serif; font-size: 18px; font-weight: 400; margin-bottom: 6px; }
.upload-zone p { font-size: 12px; color: rgba(0,0,0,0.35); }
.preview-img { width: 100%; max-height: 260px; object-fit: cover; border-radius: 14px; display: block; margin-bottom: 16px; }
.preview-meta { font-size: 12px; color: rgba(0,0,0,0.3); text-align: center; margin-bottom: 16px; }
.change-link { display: block; text-align: center; font-size: 12px; color: rgba(74,124,89,0.6); cursor: pointer; margin-bottom: 20px; text-decoration: underline; }
.primary-btn { width: 100%; background: #4a7c59; color: #f8f8f6; border: none; border-radius: 13px; padding: 17px; font-family: 'Lora', serif; font-size: 14px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
.primary-btn:disabled { opacity: 0.45; cursor: not-allowed; }
.spinner { width: 17px; height: 17px; border: 2px solid rgba(15,14,12,0.25); border-top-color: #f8f8f6; border-radius: 50%; animation: spin 0.9s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
.status-msg { text-align: center; font-size: 13px; color: rgba(0,0,0,0.35); margin-top: 14px; }
.error-msg { background: rgba(220,80,60,0.1); border: 1px solid rgba(220,80,60,0.3); border-radius: 12px; padding: 14px; font-size: 13px; color: rgba(240,235,227,0.8); margin-top: 16px; line-height: 1.6; word-break: break-word; }
.extracted-card { margin-top: 24px; background: rgba(0,0,0,0.03); border-radius: 16px; padding: 20px; border: 1px solid rgba(0,0,0,0.07); }
.ext-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #4a7c59; margin-bottom: 6px; }
.ext-title { font-family: 'Cormorant Garant', serif; font-size: 22px; font-weight: 700; margin-bottom: 4px; color: #1a1a1a; }
.ext-section-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(0,0,0,0.3); margin-bottom: 8px; margin-top: 14px; }
.ext-item { font-size: 13px; color: rgba(240,235,227,0.7); line-height: 1.6; padding: 4px 0; border-bottom: 1px solid rgba(0,0,0,0.03); }
.save-btn { width: 100%; background: #4a7c59; color: #f8f8f6; border: none; border-radius: 13px; padding: 16px; font-family: 'Lora', serif; font-size: 14px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; margin-top: 20px; }
#detailScreen { background: #f8f8f6; }
.detail-hero { position: relative; flex-shrink: 0; min-height: 220px; background: #4a7c59; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; }
.detail-hero-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
.detail-hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.65) 100%); }
.detail-hero-top { position: relative; display: flex; justify-content: space-between; align-items: flex-start; padding: 56px 16px 0; }
.detail-hero-bottom { position: relative; padding: 0 20px 20px; }
.detail-hero-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.2); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #fff; flex-shrink: 0; }
.edit-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.2); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; color: #fff; flex-shrink: 0; }
.delete-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.15); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #fff; flex-shrink: 0; }
.detail-body { flex: 1; overflow-y: auto; padding: 24px 24px 80px; }
.detail-body::-webkit-scrollbar { display: none; }
.detail-full-title { font-family: 'Cormorant Garant', serif; font-size: 28px; font-weight: 700; line-height: 1.2; margin-bottom: 6px; }
.detail-cat-tag { display: inline-block; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #4a7c59; background: rgba(74,124,89,0.1); border-radius: 6px; padding: 4px 10px; margin-bottom: 24px; }
.detail-section { margin-bottom: 28px; }
.detail-section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.detail-section-label { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: #4a7c59; font-weight: 500; }
.detail-section-line { flex: 1; height: 1px; background: rgba(74,124,89,0.18); }
.ingredient-row { display: flex; align-items: flex-start; gap: 12px; padding: 11px 13px; background: rgba(0,0,0,0.03); border-radius: 9px; border-left: 2px solid rgba(74,124,89,0.35); margin-bottom: 8px; }
.ingredient-dot { width: 5px; height: 5px; background: #4a7c59; border-radius: 50%; margin-top: 7px; flex-shrink: 0; }
.ingredient-text { font-size: 14px; line-height: 1.5; color: rgba(0,0,0,0.75); font-weight: 300; }
.method-row { display: flex; gap: 13px; margin-bottom: 14px; }
.step-num { font-family: 'Cormorant Garant', serif; font-size: 20px; color: rgba(74,124,89,0.28); font-weight: 700; line-height: 1; min-width: 26px; padding-top: 2px; }
.step-text { font-size: 14px; line-height: 1.7; color: rgba(0,0,0,0.7); font-weight: 300; padding-bottom: 13px; border-bottom: 1px solid rgba(0,0,0,0.04); flex: 1; }
.method-row:last-child .step-text { border-bottom: none; }
.notes-ta { width: 100%; background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.08); border-radius: 12px; padding: 14px; color: #1a1a1a; font-family: 'Lora', serif; font-size: 14px; line-height: 1.6; resize: none; min-height: 100px; outline: none; display: block; }
.notes-ta::placeholder { color: rgba(0,0,0,0.15); }
.notes-save-btn { margin-top: 10px; background: rgba(74,124,89,0.15); border: 1px solid rgba(74,124,89,0.3); color: #4a7c59; border-radius: 8px; padding: 8px 16px; font-family: 'Lora', serif; font-size: 12px; cursor: pointer; }
.cat-chips-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
.ext-cat-chip, .det-cat-chip { padding: 7px 14px; border-radius: 20px; border: 1px solid rgba(0,0,0,0.1); background: transparent; color: rgba(0,0,0,0.4); font-family: 'Lora', serif; font-size: 12px; cursor: pointer; }
.ext-cat-chip.selected, .det-cat-chip.selected { background: #4a7c59; border-color: #4a7c59; color: #f8f8f6; font-weight: 500; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 50; display: none; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-box { background: #ffffff; border-radius: 20px 20px 0 0; padding: 28px 24px 48px; width: 100%; max-width: 430px; }
.modal-box h3 { font-family: 'Cormorant Garant', serif; font-size: 20px; font-weight: 400; margin-bottom: 20px; }
.modal-input { width: 100%; background: rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.1); border-radius: 10px; padding: 12px 14px; color: #1a1a1a; font-family: 'Lora', serif; font-size: 14px; outline: none; margin-bottom: 12px; }
.modal-add-btn { width: 100%; background: #4a7c59; color: #f8f8f6; border: none; border-radius: 12px; padding: 15px; font-family: 'Lora', serif; font-size: 14px; font-weight: 500; cursor: pointer; margin-bottom: 10px; }
.modal-done-btn { width: 100%; background: none; border: none; color: rgba(0,0,0,0.35); font-family: 'Lora', serif; font-size: 14px; cursor: pointer; padding: 10px; }
.modal-cat-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 14px; }
.modal-cat-del { background: none; border: none; color: rgba(220,80,60,0.4); font-size: 20px; cursor: pointer; }
#editScreen { background: #f8f8f6; }
.edit-body { flex: 1; overflow-y: auto; padding: 24px 24px 100px; }
.edit-body::-webkit-scrollbar { display: none; }
.edit-field-label { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: #4a7c59; font-weight: 500; margin-bottom: 8px; margin-top: 20px; }
.edit-title-input { width: 100%; background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.08); border-radius: 10px; padding: 12px 14px; color: #1a1a1a; font-family: 'Cormorant Garant', serif; font-size: 20px; font-weight: 700; outline: none; }
.edit-title-input:focus { border-color: rgba(74,124,89,0.4); }
.edit-list-item { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 6px; }
.edit-list-ta { flex: 1; background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.08); border-radius: 8px; padding: 9px 11px; color: #1a1a1a; font-family: 'Lora', serif; font-size: 13px; line-height: 1.5; resize: none; outline: none; overflow: hidden; min-height: 36px; }
.edit-list-ta:focus { border-color: rgba(74,124,89,0.3); }
.rm-btn { width: 28px; height: 28px; border-radius: 50%; background: rgba(220,80,60,0.1); border: none; color: rgba(220,80,60,0.5); font-size: 18px; cursor: pointer; flex-shrink: 0; margin-top: 4px; }
.add-item-btn { font-size: 12px; color: rgba(74,124,89,0.6); background: none; border: 1px dashed rgba(74,124,89,0.2); border-radius: 8px; padding: 7px 14px; cursor: pointer; font-family: 'Lora', serif; margin-top: 4px; display: block; }
.edit-notes-ta { width: 100%; background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.08); border-radius: 10px; padding: 12px 14px; color: #1a1a1a; font-family: 'Lora', serif; font-size: 14px; line-height: 1.6; resize: none; min-height: 100px; outline: none; }
.edit-notes-ta:focus { border-color: rgba(74,124,89,0.3); }
.edit-notes-ta::placeholder { color: rgba(0,0,0,0.15); }
.save-all-btn { width: 100%; background: #4a7c59; color: #f8f8f6; border: none; border-radius: 13px; padding: 17px; font-family: 'Lora', serif; font-size: 14px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; margin-top: 24px; }
.photo-upload-btn { display: inline-block; background: rgba(74,124,89,0.12); border: 1px solid rgba(74,124,89,0.25); color: #4a7c59; border-radius: 8px; padding: 8px 16px; font-family: 'Lora', serif; font-size: 12px; cursor: pointer; margin-bottom: 8px; }
.tag-chip { display: inline-block; background: rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.1); color: rgba(0,0,0,0.45); border-radius: 20px; padding: 4px 10px; font-size: 11px; cursor: pointer; margin: 3px 3px 3px 0; font-family: 'Lora', serif; }
.tag-chip:hover { background: rgba(0,0,0,0.08); }
.edit-tag-input { width: 100%; background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.08); border-radius: 10px; padding: 10px 14px; color: #1a1a1a; font-family: 'Lora', serif; font-size: 13px; outline: none; }
.edit-tag-input:focus { border-color: rgba(74,124,89,0.3); }
.edit-tag-input::placeholder { color: rgba(0,0,0,0.15); }
.photo-remove-btn { display: inline-block; background: rgba(220,80,60,0.1); border: 1px solid rgba(220,80,60,0.2); color: rgba(220,80,60,0.6); border-radius: 8px; padding: 8px 16px; font-family: 'Lora', serif; font-size: 12px; cursor: pointer; margin-bottom: 8px; margin-left: 8px; }
</style>
</head>
<body>

<div class="screen" id="homeScreen">
  <div class="home-header">
    <div class="home-header-top">
      <div>
        <h1 class="home-title" id="homeTitle" style="cursor:pointer">Rapaport <em>Recipes</em></h1>
      </div>
      <button id="burgerBtn" style="width:36px;height:36px;background:rgba(0,0,0,0.05);border:1px solid rgba(0,0,0,0.08);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:rgba(0,0,0,0.45);margin-right:8px">☰</button>
      <button class="add-btn" id="addBtn">+</button>
    </div>
    <div class="search-bar" style="display:flex;gap:8px;align-items:center">
      <div style="position:relative;flex:1">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" type="search" placeholder="Search recipes…">
      </div>
      <button id="ingredientSearchBtn" style="width:40px;height:40px;border-radius:12px;border:1px solid rgba(0,0,0,0.08);background:rgba(0,0,0,0.05);color:rgba(0,0,0,0.35);font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center" title="Search by ingredient">🥕</button>
    </div>
    <div id="ingredientSearchBar" style="display:none;padding:8px 0 0">
      <div style="position:relative">
        <span style="position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:14px;opacity:0.4;pointer-events:none">🥕</span>
        <input class="search-input" id="ingredientInput" type="search" placeholder="Search by ingredient…" style="padding-left:40px">
      </div>
    </div>
  </div>
  <div id="categoryBar" style="display:none"></div>
  <div class="recipe-list" id="recipeList"></div>
</div>

<div class="screen hidden" id="newScreen" style="background:#f8f8f6">
  <div class="scan-header">
    <button class="back-btn" id="newBackBtn">←</button>
    <div class="scan-header-text">
      <div class="scan-label">Add Recipe</div>
      <h2>How would you like to add?</h2>
    </div>
  </div>
  <div class="scan-body" style="display:flex;flex-direction:column;gap:16px;padding-top:32px">
    <button id="chooseScanBtn" style="background:#f8f8f6;border:1px solid rgba(0,0,0,0.1);border-radius:16px;padding:24px;text-align:left;cursor:pointer;width:100%">
      <div style="font-family:Cormorant Garant,serif;font-size:20px;font-weight:600;color:#1a1a1a;margin-bottom:6px">📷 Scan a photo</div>
      <div style="font-size:13px;color:rgba(0,0,0,0.4)">Let Claude read and extract the recipe automatically</div>
    </button>
    <button id="chooseManualBtn" style="background:#f8f8f6;border:1px solid rgba(0,0,0,0.1);border-radius:16px;padding:24px;text-align:left;cursor:pointer;width:100%">
      <div style="font-family:Cormorant Garant,serif;font-size:20px;font-weight:600;color:#1a1a1a;margin-bottom:6px">✍️ Enter manually</div>
      <div style="font-size:13px;color:rgba(0,0,0,0.4)">Type in the recipe yourself — attach a photo of the original for reference</div>
    </button>
    <button id="chooseUrlBtn" style="background:#f8f8f6;border:1px solid rgba(0,0,0,0.1);border-radius:16px;padding:24px;text-align:left;cursor:pointer;width:100%">
      <div style="font-family:Cormorant Garant,serif;font-size:20px;font-weight:600;color:#1a1a1a;margin-bottom:6px">🔗 Paste a URL</div>
      <div style="font-size:13px;color:rgba(0,0,0,0.4)">Import a recipe from a website automatically</div>
    </button>
  </div>
</div>

<div class="screen hidden" id="manualScreen" style="background:#f8f8f6">
  <div class="scan-header">
    <button class="back-btn" id="manualBackBtn">←</button>
    <div class="scan-header-text">
      <div class="scan-label">New Recipe</div>
      <h2>Enter manually</h2>
    </div>
  </div>
  <div class="edit-body" id="manualBody" style="flex:1;overflow-y:auto;padding:24px 24px 100px"></div>
</div>

<div class="screen hidden" id="urlScreen" style="background:#f8f8f6">
  <div class="scan-header">
    <button class="back-btn" id="urlBackBtn">←</button>
    <div class="scan-header-text">
      <div class="scan-label">Import Recipe</div>
      <h2>Paste a URL</h2>
    </div>

<script>
var recipes = [];
var categories = [];
var activeCategory = 'All';
var activeTag = null;
var ingredientSearchActive = false;
var currentRecipeId = null;
var currentImages = [];
var pendingRecipe = null;

try { recipes = JSON.parse(localStorage.getItem('recipes') || '[]'); } catch(e) { recipes = []; }
try { categories = JSON.parse(localStorage.getItem('categories') || '[]'); } catch(e) { categories = []; }

function persist() {
  // Strip photos before saving to localStorage to avoid quota errors
  var recipesForStorage = recipes.map(function(r) {
    var copy = {};
    for (var k in r) { if (k !== 'photo' && k !== 'sourcePhoto') copy[k] = r[k]; }
    return copy;
  });
  try {
    localStorage.setItem('recipes', JSON.stringify(recipesForStorage));
    localStorage.setItem('categories', JSON.stringify(categories));
  } catch(e) {
    // localStorage full - clear and try again without recipes
    try { localStorage.removeItem('recipes'); } catch(e2) {}
  }
  syncCategoriesToCloud();
}

function syncCategoriesToCloud() {
  try {
    fetch('/api/categories', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ categories: categories })
    }).catch(function() {});
  } catch(e) {}
}

var cookStep = 0;
var wakeLock = null;
var tickedIngredients = {};

function enterCookMode() {
  var r = null;
  for (var i = 0; i < recipes.length; i++) { if (recipes[i].id === currentRecipeId) { r = recipes[i]; break; } }
  if (!r) return;
  cookStep = -1;
  tickedIngredients = {};
  document.getElementById('cookTitle').textContent = r.title;
  try {
    if (navigator.wakeLock) {
      navigator.wakeLock.request('screen').then(function(wl) { wakeLock = wl; }).catch(function() {});
    }
  } catch(e) {}
  renderCookScreen(r);
  showScreen('cookScreen');
}

function renderCookScreen(r) {
  var total = r.method.length;
  var body = document.getElementById('cookBody');
  var progress = document.getElementById('cookProgress');
  var nextBtn = document.getElementById('cookNextBtn');
  var prevBtn = document.getElementById('cookPrevBtn');

  if (cookStep === -1) {
    progress.textContent = 'Ingredients';
    prevBtn.style.display = 'none';
    nextBtn.textContent = 'Start Cooking →';
    var ingHtml = r.ingredients.map(function(ing, ii) {
      return '<div class="cook-ing-row" data-ii="' + ii + '" style="display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid rgba(0,0,0,0.05);cursor:pointer">' +
        '<div class="cook-ing-check" style="width:22px;height:22px;border-radius:50%;border:2px solid #4a7c59;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center"></div>' +
        '<div class="cook-ing-text" style="font-family:Lora,serif;font-size:16px;line-height:1.5;color:#1a1a1a">' + ing + '</div>' +
      '</div>';
    }).join('');
    body.innerHTML = '<div style="font-family:Cormorant Garant,serif;font-size:13px;letter-spacing:0.15em;text-transform:uppercase;color:#4a7c59;margin-bottom:16px">Ingredients</div>' + ingHtml;
    if (r.servings) body.innerHTML += '<div style="margin-top:16px;font-size:13px;color:rgba(0,0,0,0.4);font-family:Lora,serif">Serves ' + r.servings + '</div>';
    body.querySelectorAll('.cook-ing-row').forEach(function(row) {
      var ii = parseInt(row.dataset.ii);
      if (tickedIngredients[ii]) {
        row.dataset.checked = '1';
        var circle = row.querySelector('.cook-ing-check');
        var text = row.querySelector('.cook-ing-text');
        circle.style.background = '#4a7c59';
        circle.style.borderColor = '#4a7c59';
        circle.innerHTML = '<span style="color:#fff;font-size:13px;line-height:1">✓</span>';
        text.style.textDecoration = 'line-through';
        text.style.color = 'rgba(0,0,0,0.3)';
      }
      row.addEventListener('click', function() {
        var checked = this.dataset.checked === '1';
        checked = !checked;
        this.dataset.checked = checked ? '1' : '0';
        tickedIngredients[parseInt(this.dataset.ii)] = checked;
        var circle = this.querySelector('.cook-ing-check');
        var text = this.querySelector('.cook-ing-text');
        if (checked) {
          circle.style.background = '#4a7c59';
          circle.style.borderColor = '#4a7c59';
          circle.innerHTML = '<span style="color:#fff;font-size:13px;line-height:1">✓</span>';
          text.style.textDecoration = 'line-through';
          text.style.color = 'rgba(0,0,0,0.3)';
        } else {
          circle.style.background = '';
          circle.style.borderColor = '#4a7c59';
          circle.innerHTML = '';
          text.style.textDecoration = '';
          text.style.color = '#1a1a1a';
        }
      });
    });
  } else {
    var step = r.method[cookStep];
    progress.textContent = (cookStep + 1) + ' / ' + total;
    prevBtn.style.display = '';
    prevBtn.textContent = cookStep === 0 ? '← Ingredients' : '← Step ' + cookStep;
    nextBtn.textContent = cookStep === total - 1 ? '✓ Done' : 'Next →';
    body.innerHTML =
      '<div style="font-family:Cormorant Garant,serif;font-size:13px;letter-spacing:0.15em;text-transform:uppercase;color:#4a7c59;margin-bottom:20px">Step ' + (cookStep + 1) + '</div>' +
      '<div style="font-family:Lora,serif;font-size:22px;line-height:1.7;color:#1a1a1a">' + step + '</div>';
  }
}

function openManualEntry() {
  var body = document.getElementById('manualBody');
  body.innerHTML =
    '<div class="edit-field-label" style="margin-top:0">Title</div>' +
    '<input class="edit-title-input" id="manTitleInput" placeholder="Recipe title">' +
    '<div class="edit-field-label">Author</div>' +
    '<input class="edit-title-input" id="manAuthorInput" placeholder="e.g. Nigella Lawson" style="font-size:14px;font-weight:400;font-family:Lora,serif">' +
    '<div class="edit-field-label">Servings</div>' +
    '<input class="edit-title-input" id="manServingsInput" placeholder="e.g. 4 or 4-6" style="font-size:14px;font-weight:400;font-family:Lora,serif">' +
    '<div class="edit-field-label">Source URL</div>' +
    '<input class="edit-title-input" id="manUrlInput" placeholder="https://..." type="url" style="font-size:14px;font-weight:400;font-family:Lora,serif">' +
    '<div class="edit-field-label">Original Recipe Photo</div>' +
    '<div id="manSourcePhotoPreview" style="margin-bottom:8px"></div>' +
    '<label class="photo-upload-btn" style="display:inline-block;cursor:pointer">📎 Attach photo<input type="file" accept="image/*" id="manSourcePhotoInput" style="display:none"></label>' +
    '<div class="edit-field-label">Categories</div>' +
    '<div class="cat-chips-wrap" style="margin-bottom:8px" id="manCatChips">' +
    categories.map(function(c) { return '<button class="det-cat-chip" data-cat="' + c + '">' + c + '</button>'; }).join('') +
    '</div>' +
    '<div class="edit-field-label">Ingredients</div>' +
    '<div id="manIngList"><div class="edit-list-item"><textarea class="edit-list-ta" rows="1" placeholder="e.g. 2 cups flour"></textarea><button class="rm-btn" style="visibility:hidden">×</button></div></div>' +
    '<button class="add-item-btn" id="manAddIngBtn">+ Add ingredient</button>' +
    '<div class="edit-field-label">Method</div>' +
    '<div id="manMethList"><div class="edit-list-item"><textarea class="edit-list-ta" rows="2" placeholder="Step 1…"></textarea><button class="rm-btn" style="visibility:hidden">×</button></div></div>' +
    '<button class="add-item-btn" id="manAddMethBtn">+ Add step</button>' +
    '<div class="edit-field-label">Tags</div>' +
    '<div id="manTagList" style="margin-bottom:8px"></div>' +
    '<input class="edit-tag-input" id="manTagInput" placeholder="Add a tag e.g. #favourites — press Enter">' +
    '<div class="edit-field-label">Notes</div>' +
    '<textarea class="edit-notes-ta" id="manNotesInput" placeholder="Add notes, tips, variations…"></textarea>' +
    '<button class="save-all-btn" id="manSaveBtn">✓ Save Recipe</button>';

  var manTags = [];
  function renderManTags() {
    var tagList = document.getElementById('manTagList');
    if (!tagList) return;
    tagList.innerHTML = manTags.map(function(t, i) {
      return '<span class="tag-chip">' + t + ' <span data-ti="' + i + '" style="cursor:pointer;opacity:0.5">×</span></span>';
    }).join('');
    tagList.querySelectorAll('span[data-ti]').forEach(function(x) {
      x.addEventListener('click', function() { manTags.splice(parseInt(this.dataset.ti), 1); renderManTags(); });
    });
  }
  var manTagInput = document.getElementById('manTagInput');
  if (manTagInput) {
    manTagInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        var val = this.value.trim();
        if (!val) return;
        if (!val.startsWith('#')) val = '#' + val;
        if (manTags.indexOf(val) === -1) manTags.push(val);
        this.value = '';
        renderManTags();
      }
    });
  }

  body.querySelectorAll('.det-cat-chip').forEach(function(chip) {
    chip.addEventListener('click', function() { this.classList.toggle('selected'); });
  });

  body.querySelectorAll('.edit-list-ta').forEach(function(ta) {
    ta.style.height = 'auto'; ta.style.height = (ta.scrollHeight + 2) + 'px';
    ta.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = (this.scrollHeight + 2) + 'px'; });
  });

  document.getElementById('manAddIngBtn').addEventListener('click', function() {
    var list = document.getElementById('manIngList');
    var div = document.createElement('div'); div.className = 'edit-list-item';
    div.innerHTML = '<textarea class="edit-list-ta" rows="1" placeholder="Ingredient…"></textarea><button class="rm-btn">×</button>';
    div.querySelector('.rm-btn').addEventListener('click', function() { div.remove(); });
    var ta = div.querySelector('textarea');
    ta.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = (this.scrollHeight + 2) + 'px'; });
    list.appendChild(div); ta.focus();
  });

  document.getElementById('manAddMethBtn').addEventListener('click', function() {
    var list = document.getElementById('manMethList');
    var div = document.createElement('div'); div.className = 'edit-list-item';
    div.innerHTML = '<textarea class="edit-list-ta" rows="2" placeholder="Step…"></textarea><button class="rm-btn">×</button>';
    div.querySelector('.rm-btn').addEventListener('click', function() { div.remove(); });
    var ta = div.querySelector('textarea');
    ta.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = (this.scrollHeight + 2) + 'px'; });
    list.appendChild(div); ta.focus();
  });

  var manSourcePhoto = '';
  document.getElementById('manSourcePhotoInput').addEventListener('change', function() {
    var file = this.files && this.files[0]; if (!file) return;
    var fr = new FileReader();
    fr.onload = function() {
      var img = new Image();
      img.onload = function() {
        var scale = Math.min(1, 1200 / Math.max(img.width, img.height));
        var cv = document.createElement('canvas');
        cv.width = Math.round(img.width * scale); cv.height = Math.round(img.height * scale);
        cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
        manSourcePhoto = cv.toDataURL('image/jpeg', 0.8);
        document.getElementById('manSourcePhotoPreview').innerHTML =
          '<img src="' + manSourcePhoto + '" style="width:100%;max-height:180px;object-fit:cover;border-radius:10px;display:block;margin-bottom:8px">';
      };
      img.src = fr.result;
    };
    fr.readAsDataURL(file);
  });

  document.getElementById('manSaveBtn').addEventListener('click', function() {
    var title = document.getElementById('manTitleInput').value.trim();
    if (!title) { alert('Please enter a recipe title'); return; }
    var ingredients = [];
    document.getElementById('manIngList').querySelectorAll('textarea').forEach(function(ta) { if (ta.value.trim()) ingredients.push(ta.value.trim()); });
    var method = [];
    document.getElementById('manMethList').querySelectorAll('textarea').forEach(function(ta) { if (ta.value.trim()) method.push(ta.value.trim()); });
    var selectedCats = [];
    body.querySelectorAll('.det-cat-chip.selected').forEach(function(chip) { selectedCats.push(chip.dataset.cat); });
    var recipe = {
      title: title,
      author: document.getElementById('manAuthorInput').value.trim(),
      url: document.getElementById('manUrlInput') ? document.getElementById('manUrlInput').value.trim() : '',
      servings: document.getElementById('manServingsInput').value.trim(),
      categories: selectedCats,
      category: selectedCats[0] || '',
      ingredients: ingredients,
      method: method,
      notes: document.getElementById('manNotesInput').value,
      photo: '',
      sourcePhoto: manSourcePhoto,
      tags: manTags.slice(),
      id: Date.now().toString(),
      savedAt: new Date().toISOString()
    };
    pendingRecipe = null;
    recipes.unshift(recipe);
    localStorage.setItem('recipes', JSON.stringify(recipes));
    saveToCloud(recipe);
    openRecipe(recipe.id);
  });

  showScreen('manualScreen');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) {
    s.classList.toggle('hidden', s.id !== id);
  });
  if (id === 'homeScreen') { try { renderList(); } catch(e) { console.error(e); } }
  if (id === 'scanScreen') resetScan();
}

document.getElementById('addBtn').addEventListener('click', function() { showScreen('newScreen'); });
document.getElementById('burgerBtn').addEventListener('click', function() { openBurger(); });
document.getElementById('burgerExportBtn').addEventListener('click', function() {
  try {
    var data = JSON.stringify({ recipes: recipes, categories: categories, exportedAt: new Date().toISOString() }, null, 2);
    var blob = new Blob([data], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'my-recipes-' + new Date().toISOString().slice(0,10) + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    closeBurger();
  } catch(e) { alert('Export failed: ' + e.message); }
});
document.getElementById('burgerAddCatBtn').addEventListener('click', function() {
  var val = prompt('New category name:');
  if (!val || !val.trim() || categories.indexOf(val.trim()) !== -1) return;

function renderBurgerCats() {
  var list = document.getElementById('burgerCatList');
  var allActive = !activeCategory || activeCategory === 'All';
  var favActive = activeCategory === '__favourites__';
  var favCount = recipes.filter(function(r) { return r.favourite; }).length;
  var html = '<div class="burger-cat-item' + (allActive ? ' burger-cat-active' : '') + '" data-cat="All" style="display:flex;align-items:center;justify-content:space-between;padding:14px 24px;cursor:pointer;border-bottom:1px solid rgba(0,0,0,0.04)">' +
    '<span style="font-family:Lora,serif;font-size:15px;' + (allActive ? 'color:#4a7c59;font-weight:500' : 'color:#1a1a1a') + '">All Recipes</span>' +
    (allActive ? '<span style="color:#4a7c59;font-size:18px">✓</span>' : '') +
    '</div>' +
    '<div class="burger-cat-item" data-cat="__favourites__" style="display:flex;align-items:center;justify-content:space-between;padding:14px 24px;cursor:pointer;border-bottom:1px solid rgba(0,0,0,0.04)">' +
    '<span style="font-family:Lora,serif;font-size:15px;' + (favActive ? 'color:#f0a500;font-weight:500' : 'color:#1a1a1a') + '">★ Favourites' + (favCount ? ' (' + favCount + ')' : '') + '</span>' +
    (favActive ? '<span style="color:#f0a500;font-size:18px">✓</span>' : '') +
    '</div>';
  var sortedCats = categories.slice().sort(function(a, b) { return a.localeCompare(b); });
  for (var i = 0; i < sortedCats.length; i++) {
    var realIdx = categories.indexOf(sortedCats[i]);
    var isActive = activeCategory === sortedCats[i];
    html += '<div class="burger-cat-item" data-cat="' + sortedCats[i] + '" data-i="' + realIdx + '" style="display:flex;align-items:center;justify-content:space-between;padding:14px 24px;cursor:pointer;border-bottom:1px solid rgba(0,0,0,0.04)">' +
      '<span style="font-family:Lora,serif;font-size:15px;' + (isActive ? 'color:#4a7c59;font-weight:500' : 'color:#1a1a1a') + '">' + sortedCats[i] + '</span>' +
      '<div style="display:flex;align-items:center;gap:12px">' +
      (isActive ? '<span style="color:#4a7c59;font-size:18px">✓</span>' : '') +
      '<button data-del="' + realIdx + '" style="background:none;border:none;color:rgba(220,80,60,0.4);font-size:18px;cursor:pointer;padding:0;line-height:1">×</button>' +
      '</div></div>';
  }
  list.innerHTML = html;
  list.querySelectorAll('.burger-cat-item').forEach(function(item) {
    item.addEventListener('click', function(e) {
      if (e.target.dataset.del !== undefined) return;
      activeCategory = this.dataset.cat;
      activeTag = null;
      closeBurger();
      setTimeout(function() { try { renderList(); } catch(ex) {} }, 300);
    });
  });
  list.querySelectorAll('button[data-del]').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var idx = parseInt(this.dataset.del);
      if (activeCategory === categories[idx]) activeCategory = 'All';
      categories.splice(idx, 1);
      persist();
      renderBurgerCats();
      try { renderList(); } catch(ex) {}
    });
  });
}

document.getElementById('urlScrapeBtn').addEventListener('click', function() {
  var url = document.getElementById('urlInput').value.trim();
  if (!url) { document.getElementById('urlError').style.display = 'block'; document.getElementById('urlError').textContent = 'Please paste a URL first.'; return; }
  var btn = this;
  var status = document.getElementById('urlStatus');
  var errEl = document.getElementById('urlError');
  btn.disabled = true; btn.textContent = 'Importing…';
  status.style.display = 'block'; status.textContent = 'Fetching recipe from ' + url.split('/')[2] + '…';
  errEl.style.display = 'none';
  fetch('/api/scrape', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ url: url })
  }).then(function(r) { return r.json(); }).then(function(data) {
    btn.disabled = false; btn.textContent = '✦ Import Recipe';
    status.style.display = 'none';
    if (data.error) { errEl.style.display = 'block'; errEl.textContent = '⚠️ ' + data.error; return; }
    pendingRecipe = data.recipe;
    if (!pendingRecipe.url) pendingRecipe.url = url;
    showExtracted(data.recipe, 'urlExtractedSection');
  }).catch(function() {
    btn.disabled = false; btn.textContent = '✦ Import Recipe';
    status.style.display = 'none';
    errEl.style.display = 'block'; errEl.textContent = '⚠️ Network error';
  });
});

  });

  document.getElementById('addIngBtn').addEventListener('click', function() {
    var r2 = null;
    for (var i = 0; i < recipes.length; i++) { if (recipes[i].id === currentRecipeId) { r2 = recipes[i]; break; } }
    if (!r2) return;
    r2.ingredients.push('');
    openEditScreen();
    var tas = document.getElementById('ingList').querySelectorAll('textarea');
    if (tas.length) tas[tas.length - 1].focus();
  });

  document.getElementById('addMethBtn').addEventListener('click', function() {
    var r2 = null;
    for (var i = 0; i < recipes.length; i++) { if (recipes[i].id === currentRecipeId) { r2 = recipes[i]; break; } }
    if (!r2) return;
    r2.method.push('');
    openEditScreen();
    var tas = document.getElementById('methList').querySelectorAll('textarea');
    if (tas.length) tas[tas.length - 1].focus();
  });

  var saveAllBtn = document.getElementById('saveAllBtn');
  var newSaveAllBtn = saveAllBtn.cloneNode(true);
  saveAllBtn.parentNode.replaceChild(newSaveAllBtn, saveAllBtn);
  newSaveAllBtn.addEventListener('click', function() {
    if (this.dataset.saving) return;
    this.dataset.saving = '1';
    var self = this;
    setTimeout(function() { delete self.dataset.saving; }, 3000);
    var r2 = null;
    for (var i = 0; i < recipes.length; i++) { if (recipes[i].id === currentRecipeId) { r2 = recipes[i]; break; } }
    if (!r2) return;
    r2.title = document.getElementById('editTitleInput').value.trim() || r2.title;
    r2.author = document.getElementById('editAuthorInput') ? document.getElementById('editAuthorInput').value.trim() : (r2.author || '');
    r2.servings = document.getElementById('editServingsInput') ? document.getElementById('editServingsInput').value.trim() : (r2.servings || '');
    r2.url = document.getElementById('editUrlInput') ? document.getElementById('editUrlInput').value.trim() : (r2.url || '');
    r2.notes = document.getElementById('editNotesField').value;
    var selected = [];
    body.querySelectorAll('.det-cat-chip.selected').forEach(function(chip) { selected.push(chip.dataset.cat); });
    r2.categories = selected;
    r2.category = selected[0] || '';
    r2.ingredients = [];
    document.getElementById('ingList').querySelectorAll('textarea').forEach(function(ta) { if (ta.value.trim()) r2.ingredients.push(ta.value.trim()); });
    r2.method = [];
    document.getElementById('methList').querySelectorAll('textarea').forEach(function(ta) { if (ta.value.trim()) r2.method.push(ta.value.trim()); });
    persist();
    saveToCloud(r2);
    setTimeout(function() { openRecipe(currentRecipeId); }, 600);
  });

  showScreen('editScreen');
}

function buildCategories() {
  // Show active filter as a pill under the search bar if not 'All'
  var bar = document.getElementById('categoryBar');
  if (activeCategory && activeCategory !== 'All') {
    bar.style.display = 'flex';
    bar.innerHTML = '<div style="display:flex;gap:8px;padding:12px 24px;align-items:center">' +
      '<span style="font-size:11px;color:rgba(0,0,0,0.4);font-family:Lora,serif">Showing:</span>' +
      '<button style="background:' + (activeCategory === '__favourites__' ? '#f0a500' : '#4a7c59') + ';color:#fff;border:none;border-radius:20px;padding:5px 12px;font-family:Lora,serif;font-size:12px;cursor:pointer" id="clearCatBtn">' + (activeCategory === '__favourites__' ? '★ Favourites' : activeCategory) + ' ×</button>' +
      '</div>';
    var clearBtn = document.getElementById('clearCatBtn');
    if (clearBtn) clearBtn.addEventListener('click', function() { activeCategory = 'All'; try { renderList(); } catch(e) {} });
  } else if (activeTag) {
    bar.style.display = 'flex';
    bar.innerHTML = '<div style="display:flex;gap:8px;padding:12px 24px;align-items:center">' +
      '<span style="font-size:11px;color:rgba(0,0,0,0.4);font-family:Lora,serif">Tag:</span>' +
      '<button style="background:rgba(0,0,0,0.1);color:#1a1a1a;border:none;border-radius:20px;padding:5px 12px;font-family:Lora,serif;font-size:12px;cursor:pointer" id="clearTagBtn">' + activeTag + ' ×</button>' +
      '</div>';
    var clearTagBtn = document.getElementById('clearTagBtn');
    if (clearTagBtn) clearTagBtn.addEventListener('click', function() { activeTag = null; try { renderList(); } catch(e) {} });
  } else {
    bar.style.display = 'none';
    bar.innerHTML = '';
  }
}

function renderCatModal() {
  var list = document.getElementById('catModalList');
  if (!categories.length) {
    list.innerHTML = '<div style="font-size:13px;color:rgba(0,0,0,0.25);padding:8px 0 16px">No categories yet — add one below</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < categories.length; i++) {
    html += '<div class="modal-cat-row"><input class="modal-cat-edit" data-i="' + i + '" value="' + categories[i] + '" style="flex:1;background:transparent;border:none;font-family:Lora,serif;font-size:14px;color:#1a1a1a;outline:none;padding:0"><button class="modal-cat-del" data-i="' + i + '">×</button></div>';
  }
  list.innerHTML = html;
  list.querySelectorAll('.modal-cat-del').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var idx = parseInt(this.dataset.i);
      if (activeCategory === categories[idx]) activeCategory = 'All';
      categories.splice(idx, 1);
      persist();
      renderCatModal();
    });
  });
  list.querySelectorAll('.modal-cat-edit').forEach(function(input) {
    input.addEventListener('change', function() {
      var idx = parseInt(this.dataset.i);
      var newName = this.value.trim();
      if (!newName) return;
      if (activeCategory === categories[idx]) activeCategory = newName;
      categories[idx] = newName;
      persist();
    });
  });
}

function addCategory() {
  var val = document.getElementById('newCatInput').value.trim();
  if (!val || categories.indexOf(val) !== -1) return;
  categories.push(val);
  persist();
  document.getElementById('newCatInput').value = '';
  renderCatModal();
}

function renderList() {
  buildCategories();
  var q = document.getElementById('searchInput').value.toLowerCase().trim();
  var list = document.getElementById('recipeList');
  var sorted = recipes.slice().sort(function(a, b) {
    var aDate = a.lastOpened || a.savedAt || '';
    var bDate = b.lastOpened || b.savedAt || '';
    return bDate > aDate ? 1 : -1;
  });
  var filtered = sorted.filter(function(r) {
    var rCatsF = Array.isArray(r.categories) ? r.categories : (r.category ? [r.category] : []);
    var matchCat = activeCategory === 'All' || activeCategory === '__favourites__' ? true : rCatsF.indexOf(activeCategory) !== -1;
    if (activeCategory === '__favourites__' && !r.favourite) return false;
    var matchQ = !q || r.title.toLowerCase().indexOf(q) !== -1 || (r.category || '').toLowerCase().indexOf(q) !== -1
      || (r.tags || []).some(function(t) { return t.toLowerCase().indexOf(q) !== -1; });
    var ingQ = document.getElementById('ingredientInput') ? document.getElementById('ingredientInput').value.toLowerCase().trim() : '';
    var matchIng = !ingQ || (r.ingredients || []).some(function(ing) {
      var re = new RegExp('\\b' + ingQ.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i');
      return re.test(ing);
    });
    var matchTag = !activeTag || (r.tags || []).indexOf(activeTag) !== -1;
    return matchCat && matchQ && matchTag && matchIng;
  });
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📖</div><div class="empty-title">' + (recipes.length ? 'No matches' : 'No recipes yet') + '</div><div class="empty-sub">' + (recipes.length ? 'Try a different category' : 'Tap + to scan your first recipe') + '</div></div>';
    return;
  }
  list.innerHTML = '';
  var grid = document.createElement('div');
  grid.className = 'recipe-list-grid';
  for (var i = 0; i < filtered.length; i++) {
    var r = filtered[i];
    var cats = Array.isArray(r.categories) && r.categories.length ? r.categories : (r.category ? [r.category] : []);
    var firstCat = cats.length ? '<span class="recipe-cat-tag">' + cats[0] + '</span>' : '';
    var tagHtml = (r.tags && r.tags.length) ? r.tags.slice(0,3).map(function(t) { return '<span class="recipe-cat-tag" style="background:rgba(74,124,89,0.06);color:rgba(74,124,89,0.6);border:none">' + t + '</span>'; }).join('') : '';
    var imgHtml = r.photo ? '<img class="recipe-card-img" src="' + r.photo + '">' : '<img class="recipe-card-img" src="/forks.jpg">';
    var div = document.createElement('div');
    div.className = 'recipe-card';
    div.dataset.id = r.id;
    div.innerHTML = imgHtml + '<div class="recipe-card-body"><div class="recipe-card-title">' + r.title + '</div></div>';
    div.addEventListener('click', function() { openRecipe(this.dataset.id); });
    grid.appendChild(div);
  }
  list.appendChild(grid);
}

function openRecipe(id) {
  var r = null;
  for (var i = 0; i < recipes.length; i++) { if (recipes[i].id === id) { r = recipes[i]; break; } }
  if (!r) return;
  currentRecipeId = id;
  r.lastOpened = new Date().toISOString();
  persist();
  saveToCloud(r);
  document.getElementById('detailLabel').textContent = r.category || 'Recipe';
  document.getElementById('detailHeaderTitle').textContent = r.title;
  // Hero image
  var heroBg = document.getElementById('detailHeroBg');
  var heroDiv = document.getElementById('detailHero');
  if (r.photo) { heroBg.src = r.photo; heroBg.style.display = 'block'; heroDiv.style.background = '#1a1a1a'; }
  else { heroBg.style.display = 'none'; heroDiv.style.background = '#4a7c59'; }
  // Hero meta
  var heroMeta = document.getElementById('detailHeroMeta');
  heroMeta.innerHTML = '';
  if (r.author) heroMeta.innerHTML += '<span style="font-size:11px;color:rgba(255,255,255,0.85)">By ' + r.author + '</span>';
  if (r.servings) heroMeta.innerHTML += '<span style="font-size:11px;color:rgba(255,255,255,0.5)">·</span><span style="font-size:11px;color:rgba(255,255,255,0.85)">Serves ' + r.servings + '</span>';
  if (r.url) heroMeta.innerHTML += '<a href="' + r.url + '" target="_blank" style="font-size:11px;color:rgba(255,255,255,0.7);text-decoration:none;border-bottom:1px solid rgba(255,255,255,0.3)">View original ↗</a>';
  var authorHtml = '';
  var photoHtml = '';
  var sourcePhotoHtml = r.sourcePhoto ? '<div style="margin-bottom:20px"><div style="font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(0,0,0,0.3);margin-bottom:8px">Original Recipe</div><img src="' + r.sourcePhoto + '" id="sourcePhotoThumb" style="width:100%;border-radius:10px;display:block;cursor:pointer"></div>' : '';
  var ingHtml = r.ingredients.map(function(ing) { return '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid rgba(0,0,0,0.05)"><span style="width:4px;height:4px;background:#4a7c59;border-radius:50%;flex-shrink:0"></span><span style="font-size:13px;color:#1a1a1a;font-family:Lora,serif;line-height:1.4">' + ing + '</span></div>'; }).join('');
  var methHtml = r.method.map(function(s, i) { return '<div class="method-row"><div class="step-num">0' + (i + 1) + '</div><div class="step-text">' + s + '</div></div>'; }).join('');
  var rCatTags = Array.isArray(r.categories) && r.categories.length ? r.categories : (r.category ? [r.category] : []);
  var catSection = rCatTags.length ? '<div style="margin-bottom:16px">' + rCatTags.map(function(c) { return '<span style="display:inline-block;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#4a7c59;background:rgba(74,124,89,0.1);border-radius:6px;padding:3px 10px;margin-right:6px;margin-bottom:4px">' + c + '</span>'; }).join('') + '</div>' : '';
  var notesVal = r.notes || '';
  var rTags = r.tags && r.tags.length ? r.tags : [];
  var tagsHtml = rTags.length ? '<div style="margin-bottom:20px">' + rTags.map(function(t) { return '<span class="tag-chip" data-tag="' + t + '">' + t + '</span>'; }).join('') + '</div>' : '';
  var notesSection = '<div class="detail-section"><div class="detail-section-header"><div class="detail-section-label">Notes</div><div class="detail-section-line"></div></div><textarea class="notes-ta" id="notesField" placeholder="Add notes, tips, variations…">' + notesVal.replace(/</g,'&lt;') + '</textarea><button class="notes-save-btn" id="saveNotesBtn">Save notes</button></div>';
  document.getElementById('detailBody').innerHTML = sourcePhotoHtml +
    '<div class="detail-section"><div class="detail-section-header"><div class="detail-section-label">Ingredients</div><div class="detail-section-line"></div></div>' + ingHtml + '</div>' +
    '<div class="detail-section"><div class="detail-section-header"><div class="detail-section-label">Method</div><div class="detail-section-line"></div></div>' + methHtml + '</div>' +
    notesSection + catSection + tagsHtml +
    (r.sourcePhoto ? '<div class="detail-section"><div class="detail-section-header"><div class="detail-section-label">Original Recipe</div><div class="detail-section-line"></div></div><img src="' + r.sourcePhoto + '" id="sourcePhotoThumb" style="width:100%;border-radius:10px;display:block;cursor:pointer"></div>' : '');

  // Wire favourite button
  var favBtn = document.getElementById('favBtn');
  if (favBtn) {
    favBtn.textContent = r.favourite ? '★' : '☆';
    favBtn.style.color = r.favourite ? '#f0a500' : '';
    favBtn.addEventListener('click', function() {
      for (var i = 0; i < recipes.length; i++) {
        if (recipes[i].id === currentRecipeId) {
          recipes[i].favourite = !recipes[i].favourite;
          this.textContent = recipes[i].favourite ? '★' : '☆';
          this.style.color = recipes[i].favourite ? '#f0a500' : '';
          persist();
          saveToCloud(recipes[i]);
          break;
        }
      }
    });
  }
  document.getElementById('saveNotesBtn').addEventListener('click', function() {
    var notes = document.getElementById('notesField').value;
    for (var i = 0; i < recipes.length; i++) {
      if (recipes[i].id === currentRecipeId) { recipes[i].notes = notes; break; }
    }
    persist();
    this.textContent = '✓ Saved!';
    var btn = this;
    setTimeout(function() { btn.textContent = 'Save notes'; }, 1500);
  });
  if (r.sourcePhoto) {
    var fullImg = document.getElementById('sourcePhotoFull');
    if (fullImg) fullImg.src = r.sourcePhoto;
    var thumb = document.getElementById('sourcePhotoThumb');
    if (thumb) thumb.addEventListener('click', function() { document.getElementById('sourcePhotoModal').classList.add('open'); });
  }
  var spClose = document.getElementById('sourcePhotoClose');
  if (spClose) spClose.addEventListener('click', function() { document.getElementById('sourcePhotoModal').classList.remove('open'); });
  var spModal = document.getElementById('sourcePhotoModal');
  if (spModal) spModal.addEventListener('click', function(e) { if (e.target === this) this.classList.remove('open'); });
  document.querySelectorAll('#detailBody .tag-chip[data-tag]').forEach(function(chip) {
    chip.addEventListener('click', function() { activeTag = this.dataset.tag; showScreen('homeScreen'); });
  });
  showScreen('detailScreen');
}

function deleteCurrentRecipe() {
  if (!currentRecipeId) return;
  var newRecipes = [];
  for (var i = 0; i < recipes.length; i++) { if (recipes[i].id !== currentRecipeId) newRecipes.push(recipes[i]); }
  deleteFromCloud(currentRecipeId);
  recipes = newRecipes;
  persist();
  showScreen('homeScreen');
}

function resetScan() {
  currentImages = []; pendingRecipe = null;
  document.getElementById('uploadZone').style.display = 'block';
  document.getElementById('previewSection').style.display = 'none';
  document.getElementById('scanStatus').style.display = 'none';
  document.getElementById('scanError').style.display = 'none';
  document.getElementById('extractedSection').style.display = 'none';
  document.getElementById('extractedSection').innerHTML = '';
  document.getElementById('fileInput').value = '';
}

function handleFiles(files) {
  if (!files || !files.length) return;
  var total = files.length;
  var done = 0;
  for (var fi = 0; fi < files.length; fi++) {
    (function(file) {
      var reader = new FileReader();
      reader.onload = function() {
        var img = new Image();
        img.onload = function() {
          var scale = Math.min(1, 800 / Math.max(img.width, img.height));
          var canvas = document.createElement('canvas');
          canvas.width = Math.round(img.width * scale);
          canvas.height = Math.round(img.height * scale);
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          var compressed = canvas.toDataURL('image/jpeg', 0.7);
          currentImages.push({ b64: compressed.split(',')[1], mediaType: 'image/jpeg', src: compressed });
          done++;
          if (done === total) renderThumbs();
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    })(files[fi]);
  }
}

function renderThumbs() {
  document.getElementById('uploadZone').style.display = 'none';
  document.getElementById('previewSection').style.display = 'block';
  document.getElementById('scanError').style.display = 'none';
  document.getElementById('extractedSection').style.display = 'none';
  document.getElementById('extractedSection').innerHTML = '';
  pendingRecipe = null;
  var strip = document.getElementById('thumbStrip');
  strip.innerHTML = '';
  var totalKB = 0;
  for (var i = 0; i < currentImages.length; i++) {
    totalKB += Math.round(currentImages[i].b64.length * 0.75 / 1024);
    var wrap = document.createElement('div');
    wrap.style.cssText = 'position:relative;flex-shrink:0';
    var img = document.createElement('img');
    img.src = currentImages[i].src;
    img.style.cssText = 'width:80px;height:80px;object-fit:cover;border-radius:10px;display:block';
    var rm = document.createElement('button');
    rm.textContent = '×';
    rm.dataset.i = i;
    rm.style.cssText = 'position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#4a7c59;border:none;color:#f8f8f6;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1';
    rm.addEventListener('click', function() {
      currentImages.splice(parseInt(this.dataset.i), 1);
      if (currentImages.length === 0) resetScan();
      else renderThumbs();
    });
    wrap.appendChild(img); wrap.appendChild(rm);
    strip.appendChild(wrap);
  }
  document.getElementById('previewMeta').textContent = currentImages.length + ' photo' + (currentImages.length > 1 ? 's' : '') + ' · ~' + totalKB + 'KB total';
}

function scanRecipe() {
  if (!currentImages.length) { document.getElementById('scanError').style.display = 'block'; document.getElementById('scanError').textContent = 'Please select at least one photo.'; return; }
  var btn = document.getElementById('scanBtn');
  var status = document.getElementById('scanStatus');
  var errEl = document.getElementById('scanError');
  btn.disabled = true; btn.textContent = 'Reading…';
  status.style.display = 'block'; status.textContent = 'Sending ' + currentImages.length + ' photo' + (currentImages.length > 1 ? 's' : '') + ' to Claude…';
  errEl.style.display = 'none';
  var xhr = new XMLHttpRequest();
  xhr.open('POST', window.location.origin + '/api/scan', true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onload = function() {
    var data;
    try { data = JSON.parse(xhr.responseText); } catch(e) { showErr('Unexpected: ' + xhr.responseText.slice(0, 100)); return; }
    if (data.error) { showErr(data.error); return; }
    if (!data.recipe) { showErr('No recipe returned'); return; }
    pendingRecipe = data.recipe;
    status.style.display = 'none';
    showExtracted(pendingRecipe);
    btn.disabled = false; btn.textContent = '✦ Extract Recipe';
  };
  xhr.onerror = function() { showErr('Network error'); };
  xhr.send(JSON.stringify({ images: currentImages.map(function(im) { return { imageBase64: im.b64, mediaType: im.mediaType }; }) }));
  function showErr(msg) { status.style.display = 'none'; errEl.style.display = 'block'; errEl.textContent = '⚠️ ' + msg; btn.disabled = false; btn.textContent = '✦ Extract Recipe'; }
}

function showExtracted(r, containerId) {
  var sec = document.getElementById(containerId || 'extractedSection');
  sec.style.display = 'block';
  var rCats = Array.isArray(r.categories) ? r.categories : (r.category ? [r.category] : []);
  var catChips = categories.map(function(c) {
    return '<button class="ext-cat-chip' + (rCats.indexOf(c) !== -1 ? ' selected' : '') + '" data-cat="' + c + '">' + c + '</button>';
  }).join('');
  var catHtml = categories.length ? '<div style="margin-bottom:16px"><div class="ext-section-label" style="margin-top:0">Categories</div><div class="cat-chips-wrap">' + catChips + '</div></div>' : '';
  var ingHtml = r.ingredients.map(function(ing) { return '<div class="ext-item" style="color:#1a1a1a">· ' + ing + '</div>'; }).join('');
  var methHtml = r.method.map(function(s, i) { return '<div class="ext-item" style="color:#1a1a1a">' + (i + 1) + '. ' + s + '</div>'; }).join('');
  sec.innerHTML = '<div class="extracted-card"><div class="ext-label">Extracted Recipe</div><div class="ext-title">' + r.title + '</div>' + catHtml + '<div class="ext-section-label">Ingredients</div>' + ingHtml + '<div class="ext-section-label">Method</div>' + methHtml + '<button class="save-btn" id="saveBtn">✓ Save to My Recipes</button></div>';
  document.querySelectorAll('.ext-cat-chip').forEach(function(chip) {
    chip.addEventListener('click', function() { this.classList.toggle('selected'); });
  });
  var saveBtn = document.getElementById('saveBtn');
  if (saveBtn) {
    var newSaveBtn = saveBtn.cloneNode(true);
    saveBtn.parentNode.replaceChild(newSaveBtn, saveBtn);
    newSaveBtn.addEventListener('click', saveRecipe);
  }
}

function saveRecipe() {
  if (!pendingRecipe) return;
  var selectedCats = [];
  document.querySelectorAll('.ext-cat-chip.selected').forEach(function(chip) { selectedCats.push(chip.dataset.cat); });
  var recipe = { title: pendingRecipe.title, categories: selectedCats, category: selectedCats[0] || '', ingredients: pendingRecipe.ingredients, method: pendingRecipe.method, notes: pendingRecipe.notes || '', photo: '', tags: [], author: pendingRecipe.author || '', servings: pendingRecipe.servings || '', url: pendingRecipe.url || '', id: Date.now().toString(), savedAt: new Date().toISOString() };
  pendingRecipe = null;
  recipes.unshift(recipe);
  persist();
  saveToCloud(recipe);
  openRecipe(recipe.id);
}

function saveToCloud(recipe) {
  try {
    fetch('/api/recipes', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(recipe) }).catch(function() {});
  } catch(e) {}
}
function deleteFromCloud(id) {
  try {
    fetch('/api/recipes', { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: id }) }).catch(function() {});
  } catch(e) {}
}
function syncFromCloud() {
  var homeVisible = !document.getElementById('homeScreen').classList.contains('hidden');
  if (!homeVisible) return;
  try {
    fetch('/api/recipes').then(function(r) { return r.json(); }).then(function(data) {
      if (data.recipes && data.recipes.length) {
        recipes = data.recipes;
        localStorage.setItem('recipes', JSON.stringify(recipes));
        try { renderList(); } catch(e) {}
      }
    }).catch(function() {});
  } catch(e) {}
  try {
    fetch('/api/categories').then(function(r) { return r.json(); }).then(function(data) {
      if (data.categories && data.categories.length) {
        categories = data.categories;
        localStorage.setItem('categories', JSON.stringify(categories));
        try { renderList(); } catch(e) {}
      }
    }).catch(function() {});
  } catch(e) {}
}

try { renderList(); } catch(e) { console.error(e); }
syncFromCloud();
</script>
