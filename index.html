<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0e0c">
<title>My Recipes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'DM Sans', sans-serif; background: #0f0e0c; color: #f0ebe3; }
.screen { position: fixed; inset: 0; display: flex; flex-direction: column; overflow: hidden; transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s; }
.screen.hidden { transform: translateX(100%); opacity: 0; pointer-events: none; }
.top-bar { padding: 56px 24px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; border-bottom: 1px solid rgba(240,235,227,0.07); }
.back-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(240,235,227,0.06); border: none; cursor: pointer; font-size: 18px; color: #f0ebe3; flex-shrink: 0; }
.top-bar-text { flex: 1; min-width: 0; }
.top-bar-label { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: #c9a96e; font-weight: 500; margin-bottom: 3px; }
.top-bar-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.icon-btn { width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer; font-size: 15px; flex-shrink: 0; }
.scrollable { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.scrollable::-webkit-scrollbar { display: none; }
.home-header { padding: 56px 24px 20px; border-bottom: 1px solid rgba(240,235,227,0.07); flex-shrink: 0; }
.home-top { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 20px; }
.home-label { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: #c9a96e; margin-bottom: 6px; font-weight: 500; }
.home-title { font-family: 'Playfair Display', serif; font-size: 34px; font-weight: 400; line-height: 1; }
.home-title em { font-style: italic; color: #c9a96e; }
.add-btn { width: 44px; height: 44px; background: #c9a96e; border-radius: 50%; border: none; cursor: pointer; font-size: 24px; color: #0f0e0c; flex-shrink: 0; }
.search-wrap { position: relative; }
.search-input { width: 100%; background: rgba(240,235,227,0.06); border: 1px solid rgba(240,235,227,0.1); border-radius: 12px; padding: 12px 16px 12px 40px; color: #f0ebe3; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; }
.search-input::placeholder { color: rgba(240,235,227,0.25); }
.search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); opacity: 0.3; pointer-events: none; }
.cat-bar { display: flex; gap: 8px; padding: 14px 24px; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; align-items: center; }
.cat-bar::-webkit-scrollbar { display: none; }
.cat-pill { flex-shrink: 0; padding: 7px 14px; border-radius: 20px; border: 1px solid rgba(240,235,227,0.12); background: transparent; color: rgba(240,235,227,0.5); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; white-space: nowrap; }
.cat-pill.active { background: #c9a96e; border-color: #c9a96e; color: #0f0e0c; font-weight: 500; }
.cat-add-pill { flex-shrink: 0; padding: 6px 12px; border-radius: 20px; border: 1px dashed rgba(240,235,227,0.2); background: transparent; color: rgba(240,235,227,0.3); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; white-space: nowrap; }
.recipe-list { padding: 8px 24px 120px; }
.empty-state { text-align: center; padding: 80px 32px; }
.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
.empty-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 400; margin-bottom: 8px; color: rgba(240,235,227,0.5); }
.empty-sub { font-size: 13px; color: rgba(240,235,227,0.25); line-height: 1.6; }
.rcard { background: rgba(240,235,227,0.04); border-radius: 14px; padding: 16px; margin-bottom: 10px; cursor: pointer; border: 1px solid rgba(240,235,227,0.06); display: flex; gap: 12px; align-items: center; }
.rcard:active { background: rgba(240,235,227,0.08); }
.rcard-body { flex: 1; min-width: 0; }
.rcard-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.rcard-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; line-height: 1.2; flex: 1; }
.rcard-tag { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #c9a96e; background: rgba(201,169,110,0.1); border-radius: 6px; padding: 3px 8px; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
.rcard-meta { font-size: 12px; color: rgba(240,235,227,0.3); margin-top: 5px; }
.rcard-thumb { width: 58px; height: 58px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
.upload-zone { border: 1.5px dashed rgba(201,169,110,0.35); border-radius: 16px; padding: 40px 20px; text-align: center; cursor: pointer; background: rgba(201,169,110,0.03); display: block; margin-bottom: 20px; }
.upload-icon { width: 56px; height: 56px; background: rgba(201,169,110,0.12); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; font-size: 24px; }
.upload-zone h3 { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 400; margin-bottom: 6px; }
.upload-zone p { font-size: 12px; color: rgba(240,235,227,0.4); }
.preview-img { width: 100%; max-height: 240px; object-fit: cover; border-radius: 14px; display: block; margin-bottom: 12px; }
.preview-meta { font-size: 12px; color: rgba(240,235,227,0.35); text-align: center; margin-bottom: 12px; }
.change-link { display: block; text-align: center; font-size: 12px; color: rgba(201,169,110,0.6); cursor: pointer; margin-bottom: 20px; text-decoration: underline; }
.primary-btn { width: 100%; background: #c9a96e; color: #0f0e0c; border: none; border-radius: 13px; padding: 17px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; }
.primary-btn:disabled { opacity: 0.45; }
.status-msg { text-align: center; font-size: 13px; color: rgba(240,235,227,0.4); margin-top: 14px; }
.error-msg { background: rgba(220,80,60,0.1); border: 1px solid rgba(220,80,60,0.3); border-radius: 12px; padding: 14px; font-size: 13px; color: rgba(240,235,227,0.8); margin-top: 16px; line-height: 1.6; word-break: break-word; }
.ext-card { margin-top: 24px; background: rgba(240,235,227,0.04); border-radius: 16px; padding: 20px; border: 1px solid rgba(240,235,227,0.08); }
.ext-sublabel { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #c9a96e; margin-bottom: 6px; }
.ext-seclabel { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(240,235,227,0.3); margin: 14px 0 8px; }
.ext-item { font-size: 13px; color: rgba(240,235,227,0.7); line-height: 1.6; padding: 4px 0; border-bottom: 1px solid rgba(240,235,227,0.04); }
.field-input { width: 100%; background: rgba(240,235,227,0.05); border: 1px solid rgba(240,235,227,0.1); border-radius: 10px; padding: 11px 13px; color: #f0ebe3; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; margin-bottom: 10px; }
.field-input:focus { border-color: rgba(201,169,110,0.4); }
.cat-select { background: rgba(201,169,110,0.08); border: 1px solid rgba(201,169,110,0.2); border-radius: 8px; color: #c9a96e; font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 6px 10px; outline: none; margin-bottom: 16px; }
.cat-select option { background: #1a1917; color: #f0ebe3; }
.save-btn { width: 100%; background: #c9a96e; color: #0f0e0c; border: none; border-radius: 13px; padding: 16px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; margin-top: 20px; }
.det-pad { padding: 24px 24px 120px; }
.det-title { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; line-height: 1.2; margin-bottom: 8px; }
.det-tag { display: inline-block; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #c9a96e; background: rgba(201,169,110,0.1); border-radius: 6px; padding: 4px 10px; margin-bottom: 24px; }
.det-sec { margin-bottom: 28px; }
.det-sec-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.det-sec-lbl { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: #c9a96e; font-weight: 500; }
.det-sec-line { flex: 1; height: 1px; background: rgba(201,169,110,0.18); }
.ing-row { display: flex; align-items: flex-start; gap: 12px; padding: 11px 13px; background: rgba(240,235,227,0.04); border-radius: 9px; border-left: 2px solid rgba(201,169,110,0.35); margin-bottom: 8px; }
.ing-dot { width: 5px; height: 5px; background: #c9a96e; border-radius: 50%; margin-top: 7px; flex-shrink: 0; }
.ing-text { font-size: 14px; line-height: 1.5; color: rgba(240,235,227,0.82); font-weight: 300; flex: 1; }
.meth-row { display: flex; gap: 13px; margin-bottom: 14px; }
.meth-num { font-family: 'Playfair Display', serif; font-size: 20px; color: rgba(201,169,110,0.28); font-weight: 700; line-height: 1; min-width: 26px; padding-top: 2px; flex-shrink: 0; }
.meth-text { font-size: 14px; line-height: 1.7; color: rgba(240,235,227,0.78); font-weight: 300; padding-bottom: 13px; border-bottom: 1px solid rgba(240,235,227,0.05); flex: 1; }
.meth-row:last-child .meth-text { border-bottom: none; }
.notes-view { font-size: 14px; line-height: 1.7; color: rgba(240,235,227,0.65); font-weight: 300; white-space: pre-wrap; }
.notes-ta { width: 100%; background: rgba(240,235,227,0.05); border: 1px solid rgba(240,235,227,0.1); border-radius: 12px; padding: 14px; color: #f0ebe3; font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.6; resize: none; min-height: 100px; outline: none; }
.notes-ta::placeholder { color: rgba(240,235,227,0.2); }
.photo-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }
.photo-thumb { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 10px; cursor: pointer; }
.add-photo-lbl { width: 100%; aspect-ratio: 1; border-radius: 10px; border: 1.5px dashed rgba(201,169,110,0.3); background: rgba(201,169,110,0.04); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; gap: 4px; color: rgba(201,169,110,0.5); font-size: 11px; }
.add-photo-lbl span { font-size: 22px; }
.edit-item { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
.edit-item textarea { flex: 1; background: rgba(240,235,227,0.05); border: 1px solid rgba(240,235,227,0.08); border-radius: 8px; padding: 8px 10px; color: #f0ebe3; font-family: 'DM Sans', sans-serif; font-size: 13px; line-height: 1.5; resize: none; outline: none; overflow: hidden; }
.edit-item textarea:focus { border-color: rgba(201,169,110,0.3); }
.rm-btn { width: 28px; height: 28px; border-radius: 50%; background: rgba(220,80,60,0.1); border: none; color: rgba(220,80,60,0.5); font-size: 18px; cursor: pointer; flex-shrink: 0; margin-top: 4px; }
.add-item-btn { font-size: 12px; color: rgba(201,169,110,0.6); background: none; border: 1px dashed rgba(201,169,110,0.2); border-radius: 8px; padding: 7px 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 4px; }
.save-chg-btn { width: 100%; background: #c9a96e; color: #0f0e0c; border: none; border-radius: 13px; padding: 16px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; margin-top: 8px; }
.del-btn { width: 100%; background: none; border: 1px solid rgba(220,80,60,0.2); color: rgba(220,80,60,0.5); border-radius: 13px; padding: 14px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; margin-top: 10px; }
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
.modal-bg.hidden { display: none; }
.modal-box { background: #1a1917; border-radius: 20px 20px 0 0; padding: 28px 24px 48px; width: 100%; max-width: 430px; }
.modal-box h3 { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 400; margin-bottom: 20px; }
.modal-input { width: 100%; background: rgba(240,235,227,0.06); border: 1px solid rgba(240,235,227,0.12); border-radius: 10px; padding: 12px 14px; color: #f0ebe3; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; margin-bottom: 12px; }
.modal-btn { width: 100%; background: #c9a96e; color: #0f0e0c; border: none; border-radius: 12px; padding: 15px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; margin-bottom: 10px; }
.modal-cancel { width: 100%; background: none; border: none; color: rgba(240,235,227,0.4); font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; padding: 10px; }
.cat-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(240,235,227,0.06); font-size: 14px; }
.cat-del { background: none; border: none; color: rgba(220,80,60,0.4); font-size: 20px; cursor: pointer; }
.photo-viewer { position: fixed; inset: 0; background: #000; z-index: 200; display: flex; align-items: center; justify-content: center; }
.photo-viewer.hidden { display: none; }
.photo-viewer img { max-width: 100%; max-height: 80vh; object-fit: contain; }
.pv-close { position: absolute; top: 52px; right: 20px; background: rgba(255,255,255,0.1); border: none; color: #fff; font-size: 20px; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
.pv-del { position: absolute; bottom: 52px; background: rgba(220,80,60,0.3); border: 1px solid rgba(220,80,60,0.5); color: #fff; font-size: 13px; padding: 10px 24px; border-radius: 20px; cursor: pointer; }
.reset-bar { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 999; display: none; }
.reset-bar button { background: #c9a96e; color: #0f0e0c; border: none; padding: 14px 28px; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>

<!-- HOME -->

<div class="screen" id="homeScreen">
  <div class="home-header">
    <div class="home-top">
      <div><div class="home-label">Your Collection</div><h1 class="home-title">My <em>Recipes</em></h1></div>
      <button class="add-btn" id="addBtn">+</button>
      <button onclick="localStorage.clear();location.reload()" style="position:fixed;bottom:30px;right:20px;z-index:9999;background:#c9a96e;color:#0f0e0c;border:none;padding:12px 16px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer">Reset</button>

    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" type="search" placeholder="Search recipes…">
    </div>
  </div>
  <div class="cat-bar" id="catBar"></div>
  <div class="scrollable"><div class="recipe-list" id="recipeList"></div></div>
</div>

<!-- SCAN -->

<div class="screen hidden" id="scanScreen">
  <div class="top-bar">
    <button class="back-btn" id="scanBack">←</button>
    <div class="top-bar-text"><div class="top-bar-label">New Recipe</div><div class="top-bar-title">Scan a photo</div></div>
  </div>
  <div class="scrollable" style="padding:24px 24px 80px">
    <label class="upload-zone" id="uploadZone">
      <input type="file" accept="image/*" id="fileInput" style="display:none">
      <div class="upload-icon">📷</div>
      <h3>Upload a recipe photo</h3>
      <p>Tap to choose from your library</p>
    </label>
    <div id="previewSection" style="display:none">
      <img class="preview-img" id="previewImg" src="" alt="">
      <div class="preview-meta" id="previewMeta"></div>
      <label class="change-link">Change photo<input type="file" accept="image/*" id="changeInput" style="display:none"></label>
      <button class="primary-btn" id="scanBtn">✦ Extract Recipe</button>
    </div>
    <div class="status-msg" id="scanStatus" style="display:none"></div>
    <div class="error-msg" id="scanError" style="display:none"></div>
    <div id="extSection" style="display:none"></div>
  </div>
</div>

<!-- DETAIL -->

<div class="screen hidden" id="detailScreen">
  <div class="top-bar">
    <button class="back-btn" id="detBack">←</button>
    <div class="top-bar-text"><div class="top-bar-label" id="detLabel"></div><div class="top-bar-title" id="detHeaderTitle"></div></div>
    <button class="icon-btn" id="editBtn" style="background:rgba(240,235,227,0.06)">✏️</button>
    <button class="icon-btn" id="delBtn" style="background:rgba(220,80,60,0.1)">🗑</button>
  </div>
  <div class="scrollable"><div class="det-pad" id="detBody"></div></div>
</div>

<!-- CAT MODAL -->

<div class="modal-bg hidden" id="catModal">
  <div class="modal-box">
    <h3>My Categories</h3>
    <div id="catModalList"></div>
    <input class="modal-input" id="newCatInput" placeholder="New category name…">
    <button class="modal-btn" id="addCatBtn">Add Category</button>
    <button class="modal-cancel" id="catModalClose">Done</button>
  </div>
</div>

<!-- PHOTO VIEWER -->

<div class="photo-viewer hidden" id="photoViewer">
  <button class="pv-close" id="pvClose">✕</button>
  <img id="pvImg" src="" alt="">
  <button class="pv-del" id="pvDel">Delete Photo</button>
</div>

<!-- RESET BAR (shows if app crashes) -->

<div class="reset-bar" id="resetBar">
  <button onclick="localStorage.clear();location.reload()">⚠️ Reset App</button>
</div>

<script>
var recipes = [], categories = [], activeCategory = 'All', currentId = null, currentB64 = null, pendingRecipe = null, isEditing = false, viewingPhotoIdx = -1;

function loadData() {
  try {
    var r = localStorage.getItem('recipes');
    recipes = r ? JSON.parse(r) : [];
    if (!Array.isArray(recipes)) recipes = [];
    recipes = recipes.map(function(r) {
      return {
        id: String(r.id || Date.now()),
        title: String(r.title || 'Untitled'),
        category: String(r.category || ''),
        ingredients: Array.isArray(r.ingredients) ? r.ingredients : [],
        method: Array.isArray(r.method) ? r.method : [],
        notes: String(r.notes || ''),
        photos: Array.isArray(r.photos) ? r.photos : []
      };
    });
  } catch(e) { recipes = []; }
  try {
    var c = localStorage.getItem('categories');
    categories = c ? JSON.parse(c) : [];
    if (!Array.isArray(categories)) categories = [];
  } catch(e) { categories = []; }
}

function persist() {
  try { localStorage.setItem('recipes', JSON.stringify(recipes)); } catch(e) {}
  try { localStorage.setItem('categories', JSON.stringify(categories)); } catch(e) {}
}

function showScreen(id) {
  var all = document.querySelectorAll('.screen');
  for (var i = 0; i < all.length; i++) all[i].classList.toggle('hidden', all[i].id !== id);
  if (id === 'homeScreen') { isEditing = false; renderHome(); }
  if (id === 'scanScreen') resetScan();
}

function renderHome() {
  var bar = document.getElementById('catBar');
  var html = '<button class="cat-pill' + (activeCategory==='All'?' active':'') + '" data-cat="All">All</button>';
  for (var i = 0; i < categories.length; i++) {
    html += '<button class="cat-pill' + (activeCategory===categories[i]?' active':'') + '" data-cat="' + esc(categories[i]) + '">' + esc(categories[i]) + '</button>';
  }
  html += '<button class="cat-add-pill" id="manageCatsBtn">+ Category</button>';
  bar.innerHTML = html;

  var pills = bar.querySelectorAll('.cat-pill');
  for (var j = 0; j < pills.length; j++) {
    pills[j].addEventListener('click', function() { activeCategory = this.dataset.cat; renderHome(); });
  }
  document.getElementById('manageCatsBtn').addEventListener('click', openCatModal);

  var q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  var filtered = [];
  for (var k = 0; k < recipes.length; k++) {
    var r = recipes[k];
    if ((activeCategory === 'All' || r.category === activeCategory) && (!q || r.title.toLowerCase().indexOf(q) !== -1)) {
      filtered.push(r);
    }
  }

  var list = document.getElementById('recipeList');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📖</div><div class="empty-title">' + (recipes.length ? 'No matches' : 'No recipes yet') + '</div><div class="empty-sub">' + (recipes.length ? 'Try a different category' : 'Tap + to scan your first recipe') + '</div></div>';
    return;
  }
  list.innerHTML = '';
  for (var m = 0; m < filtered.length; m++) {
    var rf = filtered[m];
    var thumb = (rf.photos && rf.photos.length) ? '<img class="rcard-thumb" src="' + rf.photos[0] + '">' : '';
    var div = document.createElement('div');
    div.className = 'rcard';
    div.dataset.id = rf.id;
    div.innerHTML = '<div class="rcard-body"><div class="rcard-header"><div class="rcard-title">' + esc(rf.title) + '</div>' + (rf.category ? '<span class="rcard-tag">' + esc(rf.category) + '</span>' : '') + '</div><div class="rcard-meta">' + rf.ingredients.length + ' ingredients · ' + rf.method.length + ' steps</div></div>' + thumb;
    div.addEventListener('click', function() { openRecipe(this.dataset.id); });
    list.appendChild(div);
  }
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openCatModal() {
  renderCatModal();
  document.getElementById('catModal').classList.remove('hidden');
}

function resetScan() {
currentB64 = null; pendingRecipe = null;
document.getElementById(‘uploadZone’).style.display = ‘block’;
document.getElementById(‘previewSection’).style.display = ‘none’;
document.getElementById(‘scanStatus’).style.display = ‘none’;
document.getElementById(‘scanError’).style.display = ‘none’;
document.getElementById(‘extSection’).style.display = ‘none’;
document.getElementById(‘extSection’).innerHTML = ‘’;
document.getElementById(‘fileInput’).value = ‘’;
}

function handleFile(file) {
if (!file) return;
var fr = new FileReader();
fr.onload = function() {
var im = new Image();
im.onload = function() {
var sc = Math.min(1, 800/Math.max(im.width,im.height));
var cv = document.createElement(‘canvas’);
cv.width = Math.round(im.width*sc); cv.height = Math.round(im.height*sc);
cv.getContext(‘2d’).drawImage(im,0,0,cv.width,cv.height);
var comp = cv.toDataURL(‘image/jpeg’,0.7);
currentB64 = comp.split(’,’)[1];
document.getElementById(‘uploadZone’).style.display = ‘none’;
document.getElementById(‘previewSection’).style.display = ‘block’;
document.getElementById(‘previewImg’).src = comp;
document.getElementById(‘previewMeta’).textContent = file.name + ’ · ~’ + Math.round(currentB64.length*0.75/1024) + ‘KB’;
document.getElementById(‘scanError’).style.display = ‘none’;
document.getElementById(‘extSection’).style.display = ‘none’;
document.getElementById(‘extSection’).innerHTML = ‘’;
pendingRecipe = null;
};
im.src = fr.result;
};
fr.readAsDataURL(file);
}

function doScan() {
if (!currentB64) { document.getElementById(‘scanError’).style.display=‘block’; document.getElementById(‘scanError’).textContent=‘Please select a photo first.’; return; }
var btn = document.getElementById(‘scanBtn’);
var status = document.getElementById(‘scanStatus’);
var errEl = document.getElementById(‘scanError’);
btn.disabled = true; btn.textContent = ‘Reading…’;
status.style.display = ‘block’; status.textContent = ‘Sending to Claude…’;
errEl.style.display = ‘none’;
var xhr = new XMLHttpRequest();
xhr.open(‘POST’, window.location.origin + ‘/api/scan’, true);
xhr.setRequestHeader(‘Content-Type’,‘application/json’);
xhr.onload = function() {
var data;
try { data = JSON.parse(xhr.responseText); } catch(e) { showScanErr(’Unexpected: ’ + xhr.responseText.slice(0,100)); return; }
if (data.error) { showScanErr(data.error); return; }
if (!data.recipe) { showScanErr(‘No recipe returned’); return; }
pendingRecipe = data.recipe;
status.style.display = ‘none’;
showExtracted(pendingRecipe);
btn.disabled = false; btn.textContent = ‘✦ Extract Recipe’;
};
xhr.onerror = function() { showScanErr(‘Network error’); };
xhr.send(JSON.stringify({ imageBase64: currentB64, mediaType: ‘image/jpeg’ }));
function showScanErr(msg) {
status.style.display = ‘none’; errEl.style.display = ‘block’; errEl.textContent = ’⚠️ ’ + msg;
btn.disabled = false; btn.textContent = ‘✦ Extract Recipe’;
}
}

function showExtracted(r) {
var sec = document.getElementById(‘extSection’);
sec.style.display = ‘block’;
var catOpts = ‘<option value="">No category</option>’;
for (var i = 0; i < categories.length; i++) catOpts += ‘<option value=”’ + esc(categories[i]) + ‘”’ + (r.category===categories[i]?’ selected’:’’) + ‘>’ + esc(categories[i]) + ‘</option>’;
var ingHtml = ‘’; for (var a = 0; a < r.ingredients.length; a++) ingHtml += ’<div class="ext-item">· ’ + esc(r.ingredients[a]) + ‘</div>’;
var methHtml = ‘’; for (var b = 0; b < r.method.length; b++) methHtml += ‘<div class="ext-item">’ + (b+1) + ’. ’ + esc(r.method[b]) + ‘</div>’;
sec.innerHTML = ‘<div class="ext-card"><div class="ext-sublabel">Extracted Recipe</div>’ +
‘<input class="field-input" id="extTitleInput" value="' + esc(r.title) + '" placeholder="Recipe title">’ +
‘<select class="cat-select" id="extCatSel">’ + catOpts + ‘</select>’ +
‘<div class="ext-seclabel">Ingredients</div>’ + ingHtml +
‘<div class="ext-seclabel">Method</div>’ + methHtml +
‘<button class="save-btn" id="savePendingBtn">✓ Save to My Recipes</button></div>’;
document.getElementById(‘savePendingBtn’).addEventListener(‘click’, savePending);
}

function savePending() {
if (!pendingRecipe) return;
var title = document.getElementById(‘extTitleInput’).value.trim() || pendingRecipe.title;
var cat = document.getElementById(‘extCatSel’).value;
recipes.unshift({ id: String(Date.now()), title: title, category: cat, ingredients: pendingRecipe.ingredients, method: pendingRecipe.method, notes: ‘’, photos: [] });
persist();
showScreen(‘homeScreen’);
}
